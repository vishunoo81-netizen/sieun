<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>시은영어</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Gowun+Dodum&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --g1:#0d2e1a;--g2:#1a5c38;--g3:#2d8a56;--g4:#52b788;--g5:#95d5b2;--g6:#d8f3dc;--g7:#f0faf2;
  --text:#0d1f15;--sub:#4a7c59;--muted:#8fb8a0;--line:#d1e8d8;--white:#fff;
  --amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;
  --lv-a:#d8f3dc;--lv-a-text:#1a5c38;--lv-a-border:#52b788;
  --lv-b:#fef3c7;--lv-b-text:#92400e;--lv-b-border:#f59e0b;
  --lv-c:#fef2f2;--lv-c-text:#991b1b;--lv-c-border:#ef4444;
  --shadow:0 2px 16px rgba(13,51,32,0.07);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--g7);min-height:100vh;color:var(--text);-webkit-font-smoothing:antialiased;}

/* ===== LOGIN ===== */
#loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;background:linear-gradient(165deg,var(--g1) 0%,var(--g2) 50%,var(--g3) 100%);position:relative;overflow:hidden;}
#loginScreen::before{content:'';position:absolute;top:-80px;right:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(82,183,136,0.1),transparent 70%);}
.login-logo{text-align:center;margin-bottom:44px;z-index:1;position:relative;}
.login-logo-main{font-family:'Gowun Dodum',sans-serif;font-size:36px;color:white;margin-bottom:4px;letter-spacing:-1px;}
.login-logo-sub{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:4px;}
.login-box{width:100%;max-width:320px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:28px 22px;z-index:1;position:relative;}
.login-label{font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:6px;letter-spacing:1.5px;font-weight:600;}
.login-input{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:12px;padding:13px 16px;font-size:15px;color:white;font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:16px;transition:border-color 0.2s;-webkit-appearance:none;}
.login-input::placeholder{color:rgba(255,255,255,0.25);}
.login-input:focus{border-color:rgba(255,255,255,0.4);}
.pin-row{display:flex;gap:8px;margin-bottom:20px;}
.pin-box{flex:1;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:12px;padding:14px 0;font-size:22px;color:white;text-align:center;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
.pin-box:focus{border-color:var(--g4);}
.login-btn{width:100%;background:var(--g4);color:var(--g1);border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.login-btn:active{background:var(--g5);}
.login-err{font-size:12px;color:#fca5a5;text-align:center;margin-top:10px;display:none;}

/* ===== SETUP ===== */
#setupScreen{min-height:100vh;background:linear-gradient(165deg,var(--g1),var(--g2));padding:0;display:none;flex-direction:column;}
.setup-top{padding:60px 24px 28px;text-align:center;}
.setup-title{font-family:'Gowun Dodum',sans-serif;font-size:26px;color:white;margin-bottom:6px;}
.setup-sub{font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:2px;}
.setup-body{flex:1;background:var(--g7);border-radius:24px 24px 0 0;padding:24px 16px 100px;}

/* ===== APP ===== */
#appScreen{display:none;min-height:100vh;}
.topbar{background:var(--g2);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(13,51,32,0.2);}
.btn-back{background:none;border:none;color:rgba(255,255,255,0.8);font-size:22px;cursor:pointer;padding:2px 4px;line-height:1;flex-shrink:0;}
.topbar-info{flex:1;min-width:0;}
.topbar-title{font-size:15px;font-weight:700;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-sub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.topbar-badge{background:rgba(255,255,255,0.15);color:white;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.logout-btn{background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);font-size:11px;font-family:'Noto Sans KR',sans-serif;padding:4px 10px;border-radius:20px;cursor:pointer;white-space:nowrap;}

.screen{display:none;padding:16px 14px 100px;}
.screen.active{display:block;}

/* ===== COMMON ===== */
.card{background:var(--white);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
.card-title{font-size:11px;font-weight:700;color:var(--g3);letter-spacing:1.5px;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.card-title::before{content:'';width:3px;height:13px;background:var(--g4);border-radius:2px;flex-shrink:0;}
.date-bar{background:var(--g6);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--g2);font-weight:600;margin-bottom:14px;}
.info-note{background:linear-gradient(135deg,var(--g6),#fef9f0);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--g2);line-height:1.7;margin-bottom:14px;border-left:3px solid var(--g4);}
.sec-div{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;padding:6px 0 10px;display:flex;align-items:center;gap:8px;}
.sec-div::after{content:'';flex:1;height:1px;background:var(--line);}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:12px;color:var(--sub);font-weight:600;margin-bottom:5px;}
input,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 13px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;background:white;-webkit-appearance:none;transition:border-color 0.2s;}
input:focus,select:focus,textarea:focus{border-color:var(--g4);}
textarea{resize:none;line-height:1.6;}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* ===== CHIPS ===== */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.chip{border:1.5px solid var(--line);background:white;border-radius:20px;padding:6px 12px;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--sub);cursor:pointer;transition:all 0.15s;font-weight:500;white-space:nowrap;}
.chip.on{border-color:var(--g4);background:var(--g6);color:var(--g2);font-weight:700;}

/* ===== CLASS TABS ===== */
.class-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.class-tabs::-webkit-scrollbar{display:none;}
.class-tab{flex-shrink:0;border:1.5px solid var(--line);background:white;border-radius:20px;padding:7px 16px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--sub);cursor:pointer;font-weight:600;transition:all 0.15s;}
.class-tab.on{border-color:var(--g3);background:var(--g3);color:white;}
.class-panel{display:none;}
.class-panel.on{display:block;}

/* ===== CLINIC CARD ===== */
.clinic-card{background:var(--g7);border-radius:14px;padding:0;margin-bottom:10px;border:1.5px solid var(--g6);overflow:hidden;transition:border-color 0.2s;}
.clinic-card.filled{border-color:var(--g5);}
.clinic-card-head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;}
.clinic-card-head .s-name{font-size:15px;font-weight:700;flex:1;}
.clinic-card-head .s-badge{background:var(--g5);color:var(--g1);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.clinic-card-head .fill-dot{width:8px;height:8px;border-radius:50%;background:var(--line);flex-shrink:0;}
.clinic-card-head .fill-dot.done{background:var(--g4);}
.clinic-card-body{padding:0 16px 16px;display:none;}
.clinic-card-body.open{display:block;}
.progress-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.progress-bar{flex:1;height:4px;background:var(--line);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--g4);border-radius:2px;transition:width 0.3s;}
.progress-txt{font-size:11px;color:var(--muted);white-space:nowrap;}

/* ===== OBS HINTS ===== */
.obs-hints{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
.obs-hint{background:var(--g6);color:var(--g2);border:none;border-radius:20px;padding:5px 10px;font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.obs-hint:active{background:var(--g5);}
.char-count{font-size:11px;color:var(--muted);text-align:right;margin-top:3px;}

/* ===== LEVEL HELP BOX ===== */
.level-help{background:white;border-radius:12px;padding:12px 14px;margin-bottom:14px;box-shadow:var(--shadow);font-size:12px;line-height:1.9;}
.level-help-row{display:flex;align-items:center;gap:8px;}
.level-help-row strong{min-width:90px;display:inline-block;}

/* ===== STUDENT STATUS CARD ===== */
.status-card{background:white;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);border-left:5px solid var(--line);transition:opacity 0.3s;}
.status-card.lv-a{border-left-color:var(--lv-a-border);}
.status-card.lv-b{border-left-color:var(--lv-b-border);}
.status-card.lv-c{border-left-color:var(--lv-c-border);}
.status-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
.status-name{font-size:15px;font-weight:700;}
.status-cls{font-size:11px;color:var(--muted);margin-top:2px;}
.level-badge{font-size:11px;font-weight:700;border-radius:20px;padding:4px 10px;white-space:nowrap;}
.level-badge.lv-a{background:var(--lv-a);color:var(--lv-a-text);}
.level-badge.lv-b{background:var(--lv-b);color:var(--lv-b-text);}
.level-badge.lv-c{background:var(--lv-c);color:var(--lv-c-text);}
.level-change{font-size:11px;font-weight:700;margin-top:3px;text-align:right;}
.level-change.improved{color:#10b981;}
.level-change.worsened{color:#ef4444;}
.level-change.same{color:#9ca3af;}
.level-guide{background:#f9fafb;border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.level-meaning{font-size:12px;color:#374151;line-height:1.5;margin-bottom:3px;}
.level-action{font-size:12px;font-weight:700;color:var(--g2);}
.clinic-preview-box{background:var(--g7);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--sub);line-height:1.6;margin-bottom:10px;border:1px solid var(--line);}
.clinic-preview-box.empty{color:var(--muted);font-style:italic;}
.status-actions{display:flex;gap:6px;}
.status-actions button{flex:1;border:none;border-radius:9px;padding:9px 8px;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.btn-accept{background:var(--g6);color:var(--g2);}
.btn-override{background:#f3f4f6;color:#4b5563;}

/* 🔴 카드 비활성화 */
.status-card.lv-c .btn-accept{background:#fecaca;color:#7f1d1d;cursor:not-allowed;}
.status-card.lv-c .btn-accept.enabled{background:var(--lv-c);color:var(--lv-c-text);cursor:pointer;}

/* ===== PARENT TYPE ===== */
.pt-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.pt-btn{border:1.5px solid var(--line);background:white;border-radius:20px;padding:6px 12px;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--sub);cursor:pointer;text-align:center;transition:all 0.15s;line-height:1.4;white-space:nowrap;}
.pt-btn.on{border-color:var(--g4);background:var(--g6);color:var(--g2);font-weight:700;}

/* ===== TONE ===== */
.tone-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.tone-btn{border:1.5px solid var(--line);background:white;border-radius:8px;padding:9px 6px;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--sub);cursor:pointer;text-align:center;transition:all 0.15s;}
.tone-btn.on{border-color:var(--amber);background:#fef3c7;color:#92400e;font-weight:700;}

/* ===== CRT BANNER ===== */
.crt-banner{background:linear-gradient(135deg,var(--g1),var(--g2));border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.crt-pill{background:var(--g4);color:white;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0;}
.crt-text{color:white;font-size:13px;font-weight:600;}

/* ===== BOTTOM BTN ===== */
.bottom-btn{position:fixed;bottom:0;left:0;right:0;background:var(--g3);color:white;border:none;padding:18px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:background 0.2s;z-index:50;box-shadow:0 -4px 20px rgba(13,51,32,0.15);}
.bottom-btn:active{background:var(--g2);}
.bottom-btn:disabled{background:var(--muted);}

/* ===== RESULTS ===== */
.result-card{background:white;border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);}
.result-head{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--line);}
.result-name-wrap{}
.result-name{font-size:15px;font-weight:700;}
.result-cls{font-size:11px;color:var(--muted);margin-top:1px;}
.result-btns{display:flex;gap:6px;flex-shrink:0;}
.rbtn{border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.rbtn-edit{background:var(--g7);color:var(--sub);}
.rbtn-copy{background:var(--g6);color:var(--g2);}
.rbtn-copied{background:var(--g4);color:white;}
.result-msg{padding:14px 16px;font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap;}
.result-msg-edit{width:100%;border:none;padding:14px 16px;font-size:13px;line-height:1.9;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:#fafafa;min-height:180px;outline:none;resize:none;}
.result-footer{padding:8px 16px 10px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.result-sent{font-size:11px;color:var(--g4);font-weight:600;display:none;}
.result-sent.show{display:block;}
.save-style-btn{background:none;border:none;font-size:11px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-decoration:underline;}

/* ===== LOADING ===== */
.loading{text-align:center;padding:50px 20px;}
.loading-ring{width:36px;height:36px;border:3px solid var(--g6);border-top-color:var(--g4);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:13px;color:var(--sub);line-height:1.6;}

/* ===== ADMIN ===== */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:4px;}
.stat-num{font-size:26px;font-weight:900;color:var(--g3);text-align:center;}
.stat-label{font-size:11px;color:var(--muted);text-align:center;margin-top:2px;}
.teacher-card{background:white;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;}
.teacher-avatar{width:40px;height:40px;border-radius:50%;background:var(--g5);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--g2);flex-shrink:0;}
.teacher-info{flex:1;}
.teacher-name{font-size:14px;font-weight:700;}
.teacher-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.tbtn{border:none;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;background:var(--g6);color:var(--g2);}
.tbtn-del{background:#fef2f2;color:#991b1b;}
.alert-row{background:#fef2f2;border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:12px;color:#991b1b;display:flex;align-items:center;gap:8px;}

/* ===== HISTORY ===== */
.history-item{background:white;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
.history-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.history-name{font-size:13px;font-weight:700;}
.history-date{font-size:11px;color:var(--muted);}
.history-msg{font-size:12px;color:var(--sub);line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.edited-tag{background:var(--g6);color:var(--g2);font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;margin-right:4px;}

/* ===== TOAST ===== */
/* ===== 검색/상담 화면 ===== */
.search-bar-wrap{position:relative;margin-bottom:14px;}
.search-bar{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 16px 12px 40px;font-size:15px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;background:white;}
.search-bar:focus{border-color:var(--g4);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
.search-result-item{background:white;border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.15s;}
.search-result-item:active{background:var(--g7);}
.search-avatar{width:40px;height:40px;border-radius:50%;background:var(--g5);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--g2);flex-shrink:0;}
.search-info{flex:1;}
.search-name{font-size:15px;font-weight:700;}
.search-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.search-level{flex-shrink:0;}

/* 학생 상세 */
.detail-tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:16px;overflow-x:auto;scrollbar-width:none;}
.detail-tabs::-webkit-scrollbar{display:none;}
.detail-tab{flex-shrink:0;padding:10px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.detail-tab.on{color:var(--g2);border-bottom-color:var(--g3);}
.detail-tab-panel{display:none;}
.detail-tab-panel.on{display:block;}

.record-item{background:white;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border-left:4px solid var(--line);}
.record-item.lv-a{border-left-color:var(--lv-a-border);}
.record-item.lv-b{border-left-color:var(--lv-b-border);}
.record-item.lv-c{border-left-color:var(--lv-c-border);}
.record-date{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px;}
.record-content{font-size:12px;color:var(--sub);line-height:1.7;}

.memo-box{background:white;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
.memo-label{font-size:11px;font-weight:700;color:var(--g3);letter-spacing:1px;margin-bottom:8px;}
.memo-input{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;resize:none;line-height:1.6;}
.memo-input:focus{border-color:var(--g4);}
.memo-save-btn{margin-top:6px;background:var(--g6);color:var(--g2);border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

.target-box{background:var(--g7);border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1.5px solid var(--g6);display:flex;align-items:center;justify-content:space-between;}
.target-text{font-size:13px;color:var(--text);}
.target-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 6px;}

.action-chip{background:var(--lv-c);color:var(--lv-c-text);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;display:inline-block;margin-right:4px;margin-bottom:4px;}
.action-chip.b{background:var(--lv-b);color:var(--lv-b-text);}
.action-chip.a{background:var(--lv-a);color:var(--lv-a-text);}

<script>
// ===================================================
// MVP 임시방식 - 운영 전 서버 인증 + Supabase로 변경 필요
// API 키: localStorage 임시 저장
// 데이터: localStorage (Supabase 이전 예정)
// 공통 키: student_id / teacher_id / class_id / exam_id / question_id
// ===================================================

// ===== BASE DATA =====
// ============================================================
// Supabase 설정
// ============================================================
const SUPABASE_URL = 'https://izmxzjvnjjsuhqpasgxi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0mEDpGFtxKBizgIkwD66_Q_fpqpoR5n';
let sb = null;

function initSupabase(){
  try{
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    console.log('Supabase 연결 성공');
  }catch(e){
    console.error('Supabase 연결 실패:', e);
    sb = null;
  }
}

// Supabase 사용 가능 여부
function hasSB(){ return sb !== null; }

const BASE_CLASSES = {
  '중2 B-2':{class_id:'중2 B-2',class_name:'중2 B-2',grade:'중2',status:'active'},
  '중2 B-3':{class_id:'중2 B-3',class_name:'중2 B-3',grade:'중2',status:'active'},
  '중3 T-1':{class_id:'중3 T-1',class_name:'중3 T-1',grade:'중3',status:'active'},
  '중1 A-1':{class_id:'중1 A-1',class_name:'중1 A-1',grade:'중1',status:'active'},
  '중1 A-2':{class_id:'중1 A-2',class_name:'중1 A-2',grade:'중1',status:'active'},
  '초6 P-1':{class_id:'초6 P-1',class_name:'초6 P-1',grade:'초6',status:'active'}
};
const BASE_STUDENTS = {
  'S001':{student_id:'S001',name:'권희원',class_id:'중2 B-2',status:'active'},
  'S002':{student_id:'S002',name:'김도윤',class_id:'중2 B-2',status:'active'},
  'S003':{student_id:'S003',name:'이성빈',class_id:'중2 B-2',status:'active'},
  'S004':{student_id:'S004',name:'장은지',class_id:'중2 B-2',status:'active'},
  'S005':{student_id:'S005',name:'김동윤',class_id:'중2 B-3',status:'active'},
  'S006':{student_id:'S006',name:'김서윤',class_id:'중2 B-3',status:'active'},
  'S007':{student_id:'S007',name:'석아연',class_id:'중2 B-3',status:'active'},
  'S008':{student_id:'S008',name:'송은유',class_id:'중2 B-3',status:'active'},
  'S009':{student_id:'S009',name:'이샤론',class_id:'중3 T-1',status:'active'},
  'S010':{student_id:'S010',name:'정예원',class_id:'중3 T-1',status:'active'},
  'S011':{student_id:'S011',name:'하지율',class_id:'중3 T-1',status:'active'},
  'S012':{student_id:'S012',name:'권나은',class_id:'중3 T-1',status:'active'},
  'S013':{student_id:'S013',name:'김민규',class_id:'중3 T-1',status:'active'},
  'S014':{student_id:'S014',name:'김지현',class_id:'중3 T-1',status:'active'},
  'S015':{student_id:'S015',name:'김지호',class_id:'중3 T-1',status:'active'}
};

// ===== STATE =====
let currentUser = null;
let selectedDateKey = null; // null이면 오늘 기준
let store = { clinic:{}, teacher:{}, messages:[] };
let saveTimer = null;

// ===== UTILS =====
const getTodayKey = () => { const d=new Date(); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; };
// 날짜 유틸
function getDateKey(date){ const d=date||new Date(); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; }
function getDateLabel(date){ const d=date||new Date(); const days=['일','월','화','수','목','금','토']; return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`; }
function dateKeyToLabel(key){ if(!key||key.length!==8) return key; const y=key.slice(0,4),m=key.slice(4,6),d=key.slice(6,8); return `${parseInt(m)}월 ${parseInt(d)}일`; }
function getYesterdayKey(){ const d=new Date(); d.setDate(d.getDate()-1); return getDateKey(d); }

const getTodayLabel = () => { const d=new Date(); const days=['일','월','화','수','목','금','토']; return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`; };
const isCRTDay = () => [4,5,6].includes(new Date().getDay());
const cssId = str => str.replace(/[\s]/g,'-');
function getStudents(){
  const stored = localStorage.getItem('se-students');
  if(stored){
    const data = JSON.parse(stored);
    // 기존 데이터에 status 없으면 active로 마이그레이션
    let migrated = false;
    Object.values(data).forEach(s=>{ if(!s.status){ s.status='active'; migrated=true; } });
    if(migrated) localStorage.setItem('se-students', JSON.stringify(data));
    return data;
  }
  return JSON.parse(JSON.stringify(BASE_STUDENTS));
}
const getTeachers = () => JSON.parse(localStorage.getItem('se-teachers')||'{}');
const getConfig = () => JSON.parse(localStorage.getItem('se-config')||'{}');
// 전체 반 목록 (등록된 반 DB + 선생님 배정 반 합침)
function getAllClasses(){
  const all = new Set(getActiveClasses());
  const teachers = getTeachers();
  Object.values(teachers).forEach(t=>{
    (t.classes||[]).forEach(c=>{ if(c) all.add(c.trim()); });
  });
  return [...all].sort();
}

// 로그인한 선생님 기준 반 목록
function getMyClasses(){
  if(!currentUser) return [];
  if(currentUser.role==='admin'||currentUser.role==='clinic'||currentUser.role==='manager'){
    return getAllClasses();
  }
  // 담임: 본인 담당 반만
  return (currentUser.classes||[]);
}

const getStudentsByClass = cls => Object.values(getStudents()).filter(s=>s.class_id===cls&&s.status!=='withdrawn'&&s.status!=='paused');

// ===== 반 관리 =====
function getClasses(){
  const stored = localStorage.getItem('se-classes');
  if(stored){
    const data = JSON.parse(stored);
    // 마이그레이션: status 없으면 active
    let migrated = false;
    Object.values(data).forEach(c=>{ if(!c.status){ c.status='active'; migrated=true; } });
    if(migrated) localStorage.setItem('se-classes', JSON.stringify(data));
    return data;
  }
  return JSON.parse(JSON.stringify(BASE_CLASSES));
}
function saveClasses(data){ localStorage.setItem('se-classes', JSON.stringify(data)); }

function getActiveClasses(){
  return Object.values(getClasses()).filter(c=>c.status!=='inactive').map(c=>c.class_id||c.class_name);
}

// ===== LEVEL SYSTEM =====
function classifyStudent(clinic){
  const w=clinic.wordStatus||'', r=clinic.retestStatus||'', f=clinic.focus||'', o=clinic.observation||'';
  const dangerObs=['멈춤','흔들림','산만','시간 부족','안 떠올림','반복','피곤','막힘','끊'];
  const hasDanger = dangerObs.some(d=>o.includes(d));
  if(w==='미흡'||r==='3차 완료'||f==='산만'||(r==='2차 완료'&&hasDanger)) return 'C';
  if(w==='재시험 필요'||r==='1차 완료'||r==='2차 완료'||f==='보통'||f==='피곤함'||hasDanger) return 'B';
  return 'A';
}

function getLevelInfo(level){
  return {
    A:{label:'🟢 안정',cls:'lv-a',badgeCls:'lv-a',meaning:'오늘 흐름이 안정적입니다. 현재 흐름을 유지하면 좋습니다.',action:'추천: 그대로 진행'},
    B:{label:'🟡 유지 필요',cls:'lv-b',badgeCls:'lv-b',meaning:'약간 흔들림이 있었지만 짧게 확인하면 충분히 유지 가능한 상태입니다.',action:'추천: 다음 수업 1회 확인'},
    C:{label:'🔴 특별 관리',cls:'lv-c',badgeCls:'lv-c',meaning:'반복 흔들림 또는 수행 관리가 필요한 상태입니다. 카톡 문장을 꼭 확인해주세요.',action:'추천: 30분 단위 리셋 또는 별도 확인'}
  }[level]||{label:'🟡 유지 필요',cls:'lv-b',badgeCls:'lv-b',meaning:'',action:''};
}

function getLevelChangeType(prev,cur){
  if(!prev) return 'NEW';
  const o={A:1,B:2,C:3};
  if(o[cur]<o[prev]) return 'IMPROVED';
  if(o[cur]>o[prev]) return 'WORSENED';
  return 'SAME';
}

function getLevelChangeLabel(prev,cur){
  const t=getLevelChangeType(prev,cur);
  if(t==='NEW') return {text:'',cls:''};
  if(t==='IMPROVED') return {text:'⬇ 개선됨',cls:'improved'};
  if(t==='WORSENED') return {text:'⬆ 주의',cls:'worsened'};
  if(cur==='A') return {text:'→ 안정 유지',cls:'same'};
  if(cur==='C') return {text:'→ 계속 관리 중',cls:'worsened'};
  return {text:'→ 유지 중',cls:'same'};
}

function getPrevLevel(sid){
  try{ const h=JSON.parse(localStorage.getItem('se-lvh')||'{}'); return h[sid]?.level||''; }catch(e){ return ''; }
}

// 이전 클리닉 기록 불러오기 (오늘 제외 최근 1회)
function getPrevClinicRecord(sid){
  try{
    const keys = [];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith('se-store-')&&k!==`se-store-${getTodayKey()}`) keys.push(k);
    }
    if(keys.length===0) return null;
    keys.sort().reverse(); // 최근 순
    for(const k of keys){
      const v=localStorage.getItem(k);
      if(!v) continue;
      const s=JSON.parse(v);
      const rec=s.clinic&&s.clinic[sid];
      if(rec&&(rec.wordStatus||rec.observation||rec.score)) return rec;
    }
    return null;
  }catch(e){ return null; }
}
function saveTodayLevel(sid,level){
  try{
    const h=JSON.parse(localStorage.getItem('se-lvh')||'{}');
    // 레벨 히스토리 누적 (월간보고서 연결용)
    const prev=h[sid]?.level||'';
    h[sid]={level,prevLevel:prev,date:getTodayLabel(),date_key:getTodayKey()};
    localStorage.setItem('se-lvh',JSON.stringify(h));
    // 레벨 누적 기록 (별도 보관)
    const lvHist=JSON.parse(localStorage.getItem('se-lv-hist')||'{}');
    if(!lvHist[sid]) lvHist[sid]=[];
    lvHist[sid].push({level,date_key:getTodayKey(),date:getTodayLabel()});
    if(lvHist[sid].length>30) lvHist[sid]=lvHist[sid].slice(-30);
    localStorage.setItem('se-lv-hist',JSON.stringify(lvHist));
  }catch(e){}
}

function getChangeGuide(prev,cur){
  const t=getLevelChangeType(prev,cur);
  if(t==='NEW') return '이번이 첫 기록이므로 오늘 관찰 내용과 방향 중심으로 작성한다.';
  if(t==='IMPROVED') return '지난 수업보다 좋아진 흐름을 반드시 반영한다. 색상/레벨 표현 금지. 예: "지난 수업보다 흐름이 훨씬 안정된 모습이었어요."';
  if(t==='WORSENED') return '오늘 흔들린 부분을 부드럽게 표현하고 바로 관리 방향을 붙인다. 예: "오늘은 지난 수업보다 중간에 흐름이 살짝 끊기는 모습이 있었어요."';
  if(cur==='C') return '계속 관리가 필요하지만 부정적 반복 표현 금지. "문제 발견 + 해결책 적용 중" 느낌으로 작성. 예: "지금은 짧게 나눠서 반복하는 방식이 더 잘 맞는 상태예요."';
  if(cur==='B') return '아직 완전히 안정된 단계는 아니지만 반복하면서 잡아가는 과정으로 표현.';
  return '안정적으로 유지 중. 매번 같은 칭찬 금지. 구체 관찰을 넣어 다르게 작성.';
}

// ===== STORAGE =====
function getWorkingDateKey(){ return selectedDateKey || getTodayKey(); }
function getWorkingDateLabel(){ return selectedDateKey ? dateKeyToLabel(selectedDateKey) : getTodayLabel(); }
function saveStore(){ try{ localStorage.setItem(`se-store-${getWorkingDateKey()}`,JSON.stringify(store)); }catch(e){} }

// API 키 별도 관리 (로그인과 분리)
function getApiKey(){ return localStorage.getItem('se-api-key')||localStorage.getItem('se-api')||getConfig().apiKey||''; }

// 구버전 데이터 마이그레이션 (기존 데이터 보호)
function migrateOldData(){
  try{
    // se-edited-messages → se-edited
    const oldEdited = localStorage.getItem('se-edited-messages');
    if(oldEdited){
      const oldData = JSON.parse(oldEdited);
      if(oldData.length>0){
        const cur = JSON.parse(localStorage.getItem('se-edited')||'[]');
        const merged = [...cur, ...oldData.filter(o=>!cur.some(c=>c.at===o.at))];
        localStorage.setItem('se-edited', JSON.stringify(merged));
        localStorage.removeItem('se-edited-messages');
      }
    }
    // se-history → se-hist
    const oldHist = localStorage.getItem('se-history');
    if(oldHist){
      const oldData = JSON.parse(oldHist);
      if(oldData.length>0){
        const cur = JSON.parse(localStorage.getItem('se-hist')||'[]');
        const merged = [...cur, ...oldData.filter(o=>!cur.some(c=>c.at===o.at||c.copied_at===o.copied_at))];
        localStorage.setItem('se-hist', JSON.stringify(merged));
        localStorage.removeItem('se-history');
      }
    }
  }catch(e){}
}
function saveHistory(entry){
  try{
    // 구조화 보장 (시험분석·월간보고서 연결용)
    const structured = {
      student_id: entry.student_id||'',
      name: entry.name||'',
      class_id: entry.class_id||'',
      teacher_id: currentUser?.teacher_id||'',
      date: entry.date||getTodayLabel(),
      date_key: getTodayKey(), // YYYYMMDD 형식 (날짜 정렬용)
      message: entry.message||'',
      at: entry.at||new Date().toISOString(),
      // 나중에 시험분석 연결 공간
      exam_id: entry.exam_id||null,
    };
    let h=JSON.parse(localStorage.getItem('se-hist')||'[]');
    h.unshift(structured);
    if(h.length>300) h=h.slice(0,300);
    localStorage.setItem('se-hist',JSON.stringify(h));
  }catch(e){}
}
function getHistory(){ return JSON.parse(localStorage.getItem('se-hist')||'[]'); }
function saveEdited(entry){ try{ let e=JSON.parse(localStorage.getItem('se-edited')||'[]'); e.unshift(entry); if(e.length>50) e=e.slice(0,50); localStorage.setItem('se-edited',JSON.stringify(e)); }catch(e2){} }
function getEdited(){
  // se-edited-messages 키와 호환 (기존 데이터 마이그레이션)
  const old = localStorage.getItem('se-edited-messages');
  if(old){
    const data = JSON.parse(old);
    if(data.length>0){
      const current = JSON.parse(localStorage.getItem('se-edited')||'[]');
      const merged = [...current, ...data];
      localStorage.setItem('se-edited', JSON.stringify(merged));
      localStorage.removeItem('se-edited-messages');
    }
  }
  return JSON.parse(localStorage.getItem('se-edited')||'[]');
}

async function doLogin(){
  const id = (document.getElementById('loginId')?.value||'').trim();
  const pin = (document.getElementById('loginPin')?.value||'').trim();

  const showErr = (msg) => {
    const err = document.getElementById('loginErr');
    if(err){ err.textContent=msg; err.style.display='block'; setTimeout(()=>err.style.display='none',4000); }
    // PIN 초기화
    const pinEl = document.getElementById('loginPin');
    if(pinEl){ pinEl.value=''; pinEl.focus(); }
  };

  if(!id){ showErr('아이디를 입력해주세요'); document.getElementById('loginId')?.focus(); return; }
  if(pin.length!==4){ showErr('PIN 4자리를 입력해주세요'); return; }
  if(!/^\d{4}$/.test(pin)){ showErr('PIN은 숫자 4자리예요'); return; }

  const cfg = getConfig();
  const teachers = getTeachers();

  console.log('[로그인 시도]', {id, pinLen:pin.length, cfgExists:!!cfg.adminId, initialized:cfg.initialized});

  // 원장 로그인
  if(cfg.adminId){
    if(id === cfg.adminId && pin === cfg.adminPin){
      currentUser = {teacher_id:'ADMIN', name:'원장님', role:'admin', classes:getAllClasses()};
      enterApp(); return;
    }
  }

  // 선생님 로그인
  const teacher = Object.values(teachers).find(t => t.loginId===id && t.pin===pin && t.active!==false);
  if(teacher){
    currentUser = teacher;
    enterApp(); return;
  }

  // 실패 - Supabase에서 재확인
  if(hasSB()){
    try{
      const {data:staffData} = await sb.from('staff').select('*');
      if(staffData&&staffData.length>0){
        const found = staffData.find(t=>t.login_id===id && t.pin===pin && t.active!==false);
        if(found){
          const staffMap={};
          staffData.forEach(t=>{ staffMap[t.id]={teacher_id:t.id,name:t.name,loginId:t.login_id,pin:t.pin,role:t.role,classes:t.classes||[],active:t.active}; });
          localStorage.setItem('se-teachers',JSON.stringify(staffMap));
          currentUser={teacher_id:found.id,name:found.name,loginId:found.login_id,pin:found.pin,role:found.role,classes:found.classes||[],active:found.active};
          enterApp(); return;
        }
      }
    }catch(e){ console.error('Supabase 재확인 실패:', e); }
  }
  if(!cfg.adminId && Object.keys(teachers).length===0){
    showErr('아이디 또는 PIN이 맞지 않아요');
  } else if(cfg.adminId && id===cfg.adminId){
    showErr('PIN이 맞지 않아요 (원장 계정)');
  } else {
    const idExists = cfg.adminId===id || Object.values(teachers).some(t=>t.loginId===id);
    showErr(idExists ? 'PIN이 맞지 않아요' : '등록되지 않은 아이디예요');
  }
  console.log('[로그인 실패]', {id, cfg, teachers});
}

// 클리닉 엑셀 업로드 처리
// 컬럼: 학생명, 반, 단어교재, 범위, 점수, 재시험, 집중도, 관찰메모

function handleClinicExcel(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data,{type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

      const students = getStudents();
      // 이름→student_id 맵
      const nameMap = {};
      Object.values(students).forEach(s=>{
        if(s.status!=='withdrawn') nameMap[s.name+'_'+s.class_id] = s.student_id;
      });

      let matched=0, errors=[], autoCreated=[], skipped=[];
      // 첫 행이 헤더인지 확인 (학생명 포함이면 헤더로 간주)
      const startRow = rows[0] && String(rows[0][0]).includes('학생') ? 1 : 0;

      rows.slice(startRow).forEach((row,i)=>{
        if(!row||!row[0]) return;
        // 날짜 컬럼 자동감지
        const firstCell = String(row[0]||'');
        const hasDateCol = /^\d{4}/.test(firstCell) || /^\d{2}[.\-\/]/.test(firstCell) ||
          firstCell.includes('월') || firstCell.includes('-');
        const nameIdx = hasDateCol ? 1 : 0;
        const clsIdx  = hasDateCol ? 2 : 1;
        const name = String(row[nameIdx]||'').trim();
        const cls  = String(row[clsIdx]||'').trim();
        const key  = name+'_'+cls;
        const sid  = nameMap[key];

        if(!sid){
          // 이름만으로 시도
          const normName2 = name.replace(/\s/g,'');
          const sidByName = Object.values(students).find(s=>s.name.replace(/\s/g,'')===normName2&&s.status!=='withdrawn')?.student_id;
          if(sidByName){
            const firstCellB = String(row[0]||'');
            const hasDateB = /^\d{4}/.test(firstCellB)||firstCellB.includes('-')||firstCellB.includes('/');
            applyExcelRow(sidByName, row, hasDateB?1:0);
            matched++;
          } else if(name && cls){
            // 자동 생성 전 전체 중복 체크
            const normCheck = name.replace(/\s/g,'');
            const existAny = Object.values(students).find(s=>s.name.replace(/\s/g,'')===normCheck&&s.class_id===cls&&s.status!=='withdrawn');
            if(existAny){ skipped.push(name+' ('+cls+') - 이미 존재'); matched++; applyExcelRow(existAny.student_id, row, hasDateC?1:0); return; }
            // 학생 없으면 자동 생성
            const ids=Object.keys(students).map(k=>parseInt(k.replace('S',''))).filter(n=>!isNaN(n));
            const newId=`S${String(Math.max(0,...ids)+1).padStart(3,'0')}`;
            const newStudent={student_id:newId,name,class_id:cls,status:'active'};
            students[newId]=newStudent;
            localStorage.setItem('se-students',JSON.stringify(students));
            // Supabase에도 저장
            if(hasSB()) saveStudentToSB(newStudent);
            autoCreated.push(`${name} (${cls})`);
            const firstCellC = String(row[0]||'');
            const hasDateC = /^\d{4}/.test(firstCellC)||firstCellC.includes('-')||firstCellC.includes('/');
            applyExcelRow(newId, row, hasDateC?1:0);
            matched++;
          } else {
            errors.push(`${name||'이름없음'} (${cls||'반 미입력'}) - 이름 또는 반 누락`);
          }
          return;
        }
        // 첫 컬럼이 날짜면 offset=1 (중복 방지)
        const firstCell2 = String(row[0]||'');
        const hasDate = /^\d{4}/.test(firstCell2) || firstCell2.includes('-') || firstCell2.includes('/') || firstCell2.includes('.');
        applyExcelRow(sid, row, hasDate?1:0);
        matched++;
      });

      saveStore();

      // Supabase 저장 (백그라운드)
      if(hasSB()){
        const dateKey = getWorkingDateKey();
        let sbSaved = 0;
        const savePromises = Object.entries(store.clinic).map(async([sid, rec])=>{
          const ok = await saveClinicToSB(sid, dateKey, rec);
          if(ok) sbSaved++;
        });
        Promise.all(savePromises).then(()=>{
          console.log(`클리닉 Supabase 저장: ${sbSaved}명`);
        });
      }

      const resultEl = document.getElementById('excelResult');
      resultEl.style.display='block';
      let html = `<div style="color:var(--g2);font-weight:700;margin-bottom:6px">✅ ${matched}명 반영됐어요!</div>`;
      if(autoCreated.length>0){
        html += `<div style="color:var(--g3);font-weight:600;margin-bottom:4px">🆕 신규 학생 ${autoCreated.length}명 자동 등록</div>`;
        html += autoCreated.map(n=>`<div style="color:var(--g3)">· ${n}</div>`).join('');
      }
      if(skipped.length>0){
        html += `<div style="color:var(--amber);font-weight:600;margin-bottom:4px">⚠️ 중복 ${skipped.length}명 건너뜀 (기존 기록 업데이트)</div>`;
        html += skipped.map(n=>`<div style="color:var(--amber)">· ${n}</div>`).join('');
      }
      if(errors.length>0){
        html += `<div style="color:var(--red);font-weight:600;margin-bottom:4px">⚠️ 매칭 실패 ${errors.length}건</div>`;
        html += errors.map(e=>`<div style="color:var(--red)">· ${e}</div>`).join('');
        html += `<div style="color:var(--muted);margin-top:4px;font-size:11px">학생명과 반 이름이 시스템과 정확히 일치해야 해요</div>`;
      }
      resultEl.innerHTML = html;
      showToast(`${matched}명 엑셀 반영 완료!`);
      // 화면 새로고침
      renderClinic();
    }catch(err){
      console.error(err);
      showToast('파일을 읽지 못했어요. 엑셀 형식을 확인해주세요.');
    }
  };
  reader.readAsArrayBuffer(file);
}

function downloadExcelTemplate(){
  if(typeof XLSX==='undefined'){ showToast('잠시 후 다시 시도해주세요'); return; }
  const students = Object.values(getStudents()).filter(s=>s.status!=='withdrawn'&&s.status!=='paused');
  const rows = [
    ['날짜','학생명','반','단어교재','단어범위','단어점수','재시험','학생특징','CRT여부','CRT점수','CRT관찰','특이사항'],
    ...students.map(s=>[getTodayLabel(), s.name, s.class_id,'','','','없음','','없음','','',''])
  ];
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '클리닉');
  XLSX.writeFile(wb, `클리닉_${getTodayLabel().replace(/[()]/g,'')}.xlsx`);
  showToast('양식 다운로드됐어요!');
}

function applyExcelRow(sid, row, offset){
  // PDF 양식 기준 컬럼:
  // 0=날짜 1=학생명 2=반 3=단어교재 4=단어범위 5=단어점수 6=재시험 7=학생특징 8=CRT여부 9=CRT점수 10=CRT관찰 11=특이사항
  const o = offset||0;
  ensureClinic(sid);
  if(row[3+o]) store.clinic[sid].bookName     = String(row[3+o]).trim();
  if(row[4+o]) store.clinic[sid].range        = String(row[4+o]).trim();
  if(row[5+o]) store.clinic[sid].score        = String(row[5+o]).trim();
  if(row[6+o]) store.clinic[sid].retestStatus = String(row[6+o]).trim();
  if(row[7+o]) store.clinic[sid].obs0         = String(row[7+o]||'').trim().slice(0,50);
  if(row[8+o]) store.clinic[sid].crtYn        = String(row[8+o]||'').trim();
  if(row[9+o]) store.clinic[sid].crtScore     = String(row[9+o]||'').trim();
  if(row[10+o]) store.clinic[sid].crtObs      = String(row[10+o]||'').trim().slice(0,100);
  if(row[11+o]) store.clinic[sid].special     = String(row[11+o]||'').trim().slice(0,100);
  store.clinic[sid].observation = [store.clinic[sid].obs0, store.clinic[sid].crtObs].filter(Boolean).join(' / ');
  // 단어 상태 자동 판단
  const rt = store.clinic[sid].retestStatus||'';
  if(rt==='없음'||rt==='-'||rt==='') store.clinic[sid].wordStatus='통과';
  else if(rt.includes('있음')||rt.includes('재')) store.clinic[sid].wordStatus='재시험';
  else store.clinic[sid].wordStatus=rt;
  // CRT 상태
  const crt = store.clinic[sid].crtYn||'';
  if(crt==='있음'||crt==='O'||crt==='o') store.clinic[sid].crtStatus='완료';
  else if(crt&&crt!=='없음'&&crt!=='X') store.clinic[sid].crtStatus=crt; // 날짜나 메모
  else store.clinic[sid].crtStatus='';
}

// Supabase 동기화 (로그인 후 자동 실행)
async function syncFromSupabase(){
  if(!hasSB()){
    console.log('Supabase 미연결 - localStorage 사용');
    return;
  }
  try{
    showToast('동기화 중...');
    // 선생님 동기화
    const {data:staffData} = await sb.from('staff').select('*');
    if(staffData&&staffData.length>0){
      const staffMap={};
      staffData.forEach(t=>{ staffMap[t.id]={teacher_id:t.id,name:t.name,loginId:t.login_id,pin:t.pin,role:t.role,classes:t.classes||[],active:t.active}; });
      localStorage.setItem('se-teachers',JSON.stringify(staffMap));
    }
    // 반 동기화
    const classes = await loadClassesFromSB();
    // 학생 동기화
    const students = await loadStudentsFromSB();
    // 오늘 클리닉 동기화
    const clinicData = await loadClinicFromSB(getWorkingDateKey());
    if(clinicData && Object.keys(clinicData).length > 0){
      store.clinic = {...store.clinic, ...clinicData};
      saveStore();
    }
    showToast('동기화 완료 ✓');
  }catch(e){
    console.error('동기화 실패:', e);
  }
}

// 화면 히스토리 스택
const screenHistory = [];

function showScreen(name){
  // 현재 화면 히스토리에 저장
  const current = document.querySelector('.screen.active');
  if(current && current.id !== 'screen-'+name){
    screenHistory.push(current.id.replace('screen-',''));
    if(screenHistory.length > 10) screenHistory.shift();
  }
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  document.querySelectorAll('.bottom-btn').forEach(b=>b.remove());
}

function goBack(){
  if(screenHistory.length === 0){ showMenu(); return; }
  const prev = screenHistory.pop();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById('screen-'+prev);
  if(el) el.classList.add('active');
  else showMenu();
}

function toggleClinicCard(sid){
  const body=document.getElementById(`cb-${sid}`);
  body.classList.toggle('open');
}

function clinicObsInput(sid){
  ensureClinic(sid);
  const obs0=document.getElementById(`obs0-${sid}`)?.value||'';
  const obs1=document.getElementById(`obs1-${sid}`)?.value||'';
  const obs2=document.getElementById(`obs2-${sid}`)?.value||'';
  store.clinic[sid].obs0=obs0;
  store.clinic[sid].obs1=obs1;
  store.clinic[sid].obs2=obs2;
  // 하위 호환 - observation 필드도 유지
  store.clinic[sid].obs0=obs0.slice(0,50);
  store.clinic[sid].obs1=obs1.slice(0,50);
  store.clinic[sid].obs2=obs2.slice(0,50);
  store.clinic[sid].observation=[obs0,obs1,obs2].filter(Boolean).join(' / ');
  updateClinicStatus(sid); autoSave('clinicSave');
}

function toggleObsTag(sid, val, btn){
  ensureClinic(sid);
  if(!store.clinic[sid].obsTags) store.clinic[sid].obsTags=[];
  const arr=store.clinic[sid].obsTags;
  const idx=arr.indexOf(val);
  if(idx>-1){ arr.splice(idx,1); btn.classList.remove('on'); }
  else{
    if(arr.length>=2){ showToast('최대 2개까지 선택할 수 있어요'); return; }
    arr.push(val); btn.classList.add('on');
  }
  updateClinicStatus(sid); autoSave('clinicSave');
}

function setObs(sid,text){
  // 첫 번째 빈 칸에 입력
  for(let n=0;n<3;n++){
    const el=document.getElementById(`obs${n}-${sid}`);
    if(el&&!el.value){ el.value=text; clinicObsInput(sid); return; }
  }
  // 모두 차있으면 마지막에 덮어쓰기
  const el=document.getElementById(`obs2-${sid}`);
  if(el){ el.value=text; clinicObsInput(sid); }
}
function updateLen(sid){} // deprecated - 관찰메모 3개 구조로 변경됨
function isClinicFilled(sid){ const r=store.clinic[sid]||{}; return !!(r.bookName||r.range||r.score||r.wordStatus||r.retestStatus||r.focus||r.obs0||r.observation||r.crtScore||(r.obsTags&&r.obsTags.length>0)); }

function clinicChip(sid,field,val,btn){
  btn.closest('.chips').querySelectorAll('.chip').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ensureClinic(sid); store.clinic[sid][field]=val;
  updateClinicStatus(sid); autoSave('clinicSave');
}
function clinicInput(sid){
  ensureClinic(sid);
  store.clinic[sid].bookName=document.getElementById(`book-${sid}`)?.value||'';
  store.clinic[sid].range=document.getElementById(`range-${sid}`)?.value||'';
  store.clinic[sid].score=document.getElementById(`score-${sid}`)?.value||'';
  // 관찰 메모 3개 수집 (clinicObsInput에서 처리)
  // obsTags는 클릭으로만 관리
  store.clinic[sid].crtScore=document.getElementById(`crt-score-${sid}`)?.value||'';
  updateClinicStatus(sid); autoSave('clinicSave');
}
function updateClinicStatus(sid){
  const filled=isClinicFilled(sid);
  const card=document.getElementById(`cc-${sid}`), dot=document.getElementById(`fd-${sid}`);
  if(card) card.classList.toggle('filled',filled);
  if(dot) dot.classList.toggle('done',filled);
}
function ensureClinic(sid){ if(!store.clinic[sid]) store.clinic[sid]={}; }
function collectClinic(){
  Object.values(getStudents()).forEach(s=>{
    const sid=s.student_id;
    ensureClinic(sid);
    store.clinic[sid].bookName=document.getElementById(`book-${sid}`)?.value||store.clinic[sid].bookName||'';
    store.clinic[sid].range=document.getElementById(`range-${sid}`)?.value||store.clinic[sid].range||'';
    store.clinic[sid].score=document.getElementById(`score-${sid}`)?.value||store.clinic[sid].score||'';
    store.clinic[sid].observation=document.getElementById(`obs-${sid}`)?.value||store.clinic[sid].observation||'';
  });
}

function getCounselKey(sid, dateKey){ return `se-counsel-${sid}-${dateKey||getWorkingDateKey()}`; }
function getCounselRecord(sid, dateKey){ return localStorage.getItem(getCounselKey(sid, dateKey))||''; }

function saveCounselRecord(sid, cls){
  const el = document.getElementById(`counsel-${sid}`);
  if(!el) return;
  const text = el.value.trim();
  if(!text){ showToast('내용을 입력해주세요'); return; }
  localStorage.setItem(getCounselKey(sid), text);
  // 히스토리 저장
  saveHistory({
    student_id: sid,
    name: getStudents()[sid]?.name||'',
    class_id: cls,
    date: getWorkingDateLabel(),
    date_key: getWorkingDateKey(),
    message: text,
    type: 'counsel',
    at: new Date().toISOString()
  });
  // Supabase 저장
  if(hasSB()){
    saveCounselToSB(sid, cls, getWorkingDateKey(), text).then(ok=>{
      if(ok) console.log('상담 Supabase 저장 완료');
      else console.warn('상담 Supabase 저장 실패 - localStorage에는 저장됨');
    });
  }
  el.style.background = '#f0fdf4';
  showToast('저장됐어요 ✓');
}

function clearCounselRecord(sid){
  const el = document.getElementById(`counsel-${sid}`);

  showToast('지웠어요');
}

function saveAllCounselRecords(){
  let saved = 0;
  document.querySelectorAll('[id^="counsel-"]').forEach(el => {
    if(el.tagName==='TEXTAREA' && el.value.trim()){
      const sid = el.id.replace('counsel-','');
      const s = getStudents()[sid];
      if(!s) return;
      localStorage.setItem(getCounselKey(sid), el.value.trim());
      el.style.background = '#f0fdf4';
      saved++;
    }
  });
  saveStore();
  showToast(saved>0 ? `${saved}명 기록 저장됐어요 ✓` : '저장할 내용이 없어요');
}

function saveField(id, field, cls){
  const el=document.getElementById(id);
  if(!el) return;
  const val=el.value.trim();
  if(!store.teacher[cls]) store.teacher[cls]={};
  if(field==='prog') store.teacher[cls].progress=val;
  else if(field==='hw') store.teacher[cls].homework=val;
  saveStore();
  showToast(val ? '저장됐어요 ✓' : '내용이 비어있어요');
}
function clearField(id, cls, field){
  const el=document.getElementById(id);
  if(el){ el.value=''; }
  if(cls&&field){
    if(!store.teacher[cls]) store.teacher[cls]={};
    if(field==='prog') store.teacher[cls].progress='';
    else if(field==='hw') store.teacher[cls].homework='';
    saveStore();
  }
  showToast('삭제됐어요');
}
function focusField(id){
  const el=document.getElementById(id);
  if(el){ el.focus(); el.setSelectionRange(el.value.length,el.value.length); }
}
function teacherChanged(){
  const myClasses=getMyClasses();
  myClasses.forEach(cls=>{
    const td=store.teacher[cls]||{};
    const prog=document.getElementById(`prog-ta-${cssId(cls)}`)||document.getElementById(`prog-${cssId(cls)}`);
    const hw=document.getElementById(`hw-ta-${cssId(cls)}`)||document.getElementById(`hw-${cssId(cls)}`);
    if(prog) td.progress=prog.value;
    if(hw) td.homework=hw.value;
    store.teacher[cls]=td;
  });
  autoSave('teacherSave');
}

function addTeacher(){
  const name=document.getElementById('nName')?.value.trim();
  const lid=document.getElementById('nId')?.value.trim();
  const pin=document.getElementById('nPin')?.value.trim();
  const role=document.getElementById('nRole')?.value;
  const cls=(document.getElementById('nClasses')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  if(!name||!lid||pin?.length!==4){ showToast('이름·아이디·PIN(4자리) 필수예요'); return; }
  const teachers=getTeachers();
  if(Object.values(teachers).some(t=>t.loginId===lid)){ showToast('이미 있는 아이디예요'); return; }
  const ids=Object.keys(teachers).map(k=>parseInt(k.replace('T',''))).filter(n=>!isNaN(n));
  const tid=`T${String(Math.max(0,...ids)+1).padStart(3,'0')}`;
  teachers[tid]={teacher_id:tid,name,loginId:lid,pin,role,classes:cls,active:true};
  localStorage.setItem('se-teachers',JSON.stringify(teachers));
  // Supabase에도 저장
  if(hasSB()){
    sb.from('staff').upsert({
      id: tid, name: name, login_id: lid,
      pin: pin, role: role, classes: cls, active: true
    },{onConflict:'id'}).then(({error})=>{
      if(error) console.error('선생님 Supabase 저장 실패:', error);
      else console.log('선생님 Supabase 저장 완료');
    });
  }
  showToast(`${name} 선생님 추가됐어요!`);
  renderAdmin();
}

function delTeacher(tid){
  const teachers=getTeachers(), t=teachers[tid];
  if(!t) return;
  if(t.role==='teacher'&&(t.classes||[]).length>0){
    showReassignModal(tid,t.name,t.classes||[]);
  } else {
    t.active=false;
    localStorage.setItem('se-teachers',JSON.stringify(teachers));
    showToast(`${t.name} 비활성화됐어요`);
    renderAdmin();
  }
}

  const teachers=getTeachers();
  const others=Object.values(teachers).filter(t=>t.teacher_id!==tid&&t.role==='teacher');
  const modal=document.createElement('div');

      <button onclick="this.closest('[style*=fixed]').remove()" style="flex:1;background:#f3f4f6;color:var(--text);border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;">취소</button>

  </div>`;
  document.body.appendChild(modal);

function doReassign(tid,name){
  const newTid=document.getElementById('reassignTarget')?.value||'';
  const teachers=getTeachers(), students=getStudents(), t=teachers[tid];
  if(!t) return;
  if(newTid){
    Object.values(students).forEach(s=>{ if(s.teacher_id===tid) s.teacher_id=newTid; });
    localStorage.setItem('se-students',JSON.stringify(students));
    if(teachers[newTid]){
      const nc=new Set([...(teachers[newTid].classes||[]),...(t.classes||[])]);
      teachers[newTid].classes=[...nc];
    }
  }
  t.active=false; t.classes=[];
  localStorage.setItem('se-teachers',JSON.stringify(teachers));
  if(hasSB()){ sb.from('staff').update({active:false,classes:[]}).eq('id',tid).then(function(r){ if(r.error) console.error('퇴사처리실패',r.error); }); }
  document.querySelector('[style*="position:fixed"]')?.remove();
  showToast(name+' 퇴사 처리 완료');
  renderAdmin();
}

function reactivateTeacher(tid){
  const teachers=getTeachers();
  if(!teachers[tid]) return;
  teachers[tid].active=true;
  localStorage.setItem('se-teachers',JSON.stringify(teachers));
  if(hasSB()){ sb.from('staff').update({active:true}).eq('id',tid).then(function(r){ if(r.error) console.error('복직실패',r.error); }); }
  showToast(teachers[tid].name+' 복직 처리됐어요');
  renderAdmin();
}

function saveEditTeacher(tid){
  const teachers=getTeachers();
  if(!teachers[tid]) return;
  const name=document.getElementById('et-name')?.value.trim();
  const loginId=document.getElementById('et-id')?.value.trim();
  const pin=document.getElementById('et-pin')?.value.trim();
  const role=document.getElementById('et-role')?.value;
  const cls=(document.getElementById('et-classes')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  if(!name||!loginId){ showToast('이름과 아이디는 필수예요'); return; }
  teachers[tid].name=name; teachers[tid].loginId=loginId;
  teachers[tid].role=role; teachers[tid].classes=cls;
  if(pin&&pin.length===4) teachers[tid].pin=pin;
  localStorage.setItem('se-teachers',JSON.stringify(teachers));
  if(hasSB()){
    const upd={name:name,login_id:loginId,role:role,classes:cls};
    if(pin&&pin.length===4) upd.pin=pin;
    sb.from('staff').update(upd).eq('id',tid).then(function(r){ if(r.error) console.error('선생님수정실패',r.error); });

}

      <div style="display:flex;gap:4px">
        <button class="tbtn" onclick="editClassName('${c.class_id}')">수정</button>
        <button class="tbtn tbtn-del" onclick="deactivateClass('${c.class_id}')">비활성</button>
      </div>
    </div>`;
  });
  if(inactive.length>0){
    html+=`<div style="text-align:center;margin:8px 0"><button style="background:none;border:1.5px solid var(--line);border-radius:20px;padding:6px 14px;font-size:11px;font-family:'Noto Sans KR',sans-serif;color:var(--sub);cursor:pointer;" onclick="toggleInactiveClasses()">${showInactive?'▲ 숨기기':`▼ 비활성 반 (${inactive.length}개)`}</button></div>`;
    if(showInactive) inactive.forEach(c=>{ html+=`<div class="teacher-card" style="opacity:0.5"><div class="teacher-avatar" style="background:#f3f4f6;color:#9ca3af;font-size:12px">${c.grade||''}</div><div class="teacher-info"><div class="teacher-name">${c.class_id}</div><div class="teacher-meta">비활성</div></div><button class="tbtn" onclick="reactivateClass('${c.class_id}')">복구</button></div>`; });
  }
  return html;
}

function addClass(){
  const name=document.getElementById('newClsName')?.value.trim();
  const grade=document.getElementById('newClsGrade')?.value.trim();
  if(!name){ showToast('반 이름을 입력해주세요'); return; }
  const classes=getClasses();
  if(classes[name]){ showToast('이미 있는 반이에요'); return; }
  classes[name]={class_id:name,class_name:name,grade:grade||'',status:'active'};
  saveClasses(classes); showToast(`${name} 반 추가됐어요!`); renderAdmin();
}
function editClassName(classId){
  const newName=prompt(`반 이름 수정\n현재: ${classId}`);
  if(!newName?.trim()) return;
  const clean=newName.trim(); const classes=getClasses();
  if(classes[clean]){ showToast('이미 있는 이름이에요'); return; }
  classes[clean]={...classes[classId],class_id:clean,class_name:clean}; delete classes[classId];
  const students=getStudents();
  Object.values(students).forEach(s=>{ if(s.class_id===classId) s.class_id=clean; });
  localStorage.setItem('se-students',JSON.stringify(students));
  saveClasses(classes); showToast(`${classId} → ${clean}`); renderAdmin();
}
function deactivateClass(classId){
  const students=Object.values(getStudents()).filter(s=>s.class_id===classId&&s.status!=='withdrawn');
  if(students.length>0){ showToast(`학생 ${students.length}명이 있어요. 먼저 이동해주세요`); return; }
  const classes=getClasses(); classes[classId].status='inactive';
  saveClasses(classes); showToast(`${classId} 비활성화됐어요`); renderAdmin();
}
function reactivateClass(classId){
  const classes=getClasses(); classes[classId].status='active';
  saveClasses(classes); showToast(`${classId} 복구됐어요`); renderAdmin();
}
function toggleInactiveClasses(){
  localStorage.setItem('se-show-cls',localStorage.getItem('se-show-cls')==='1'?'0':'1'); renderAdmin();
}

function renderSearch(){
  showScreen('search');
  setTopbar('학생 검색','←',goBack,'');
  const myClasses=getMyClasses();
  document.getElementById('screen-search').innerHTML=`
    <div class="date-bar">🔍 학생 검색</div>
    <div class="search-bar-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-bar" id="studentSearchInput" placeholder="학생 이름 또는 반 입력..." oninput="doSearch(this.value)" autocomplete="off">
    </div>
    <div id="searchResults">${renderClassList(myClasses)}</div>`;
  setTimeout(()=>document.getElementById('studentSearchInput')?.focus(),100);
}

function renderClassList(classes){
  const students=getStudents(); let html='';
  classes.forEach(cls=>{
    const cls_students=Object.values(students).filter(s=>s.class_id===cls&&s.status!=='withdrawn');
    if(!cls_students.length) return;
    html+=`<div class="sec-div">${cls} (${cls_students.length}명)</div>`;
    cls_students.forEach(s=>{
      const clinic=store.clinic[s.student_id]||{};
      const level=clinic.finalLevel||classifyStudent(clinic);
      const lvInfo=getLevelInfo(level);
      html+=`<div class="search-result-item" onclick="renderStudentDetail('${s.student_id}')">
        <div class="search-avatar">${s.name[0]}</div>
        <div class="search-info"><div class="search-name">${s.name}</div><div class="search-meta">${cls} · ${isClinicFilled(s.student_id)?'✅ 오늘 입력':'⬜ 미입력'}</div></div>
        <div class="search-level"><span class="level-badge ${lvInfo.badgeCls}" style="font-size:10px">${lvInfo.label}</span></div>
      </div>`;
    });
  });
  return html||'<div class="card" style="text-align:center;padding:30px;color:var(--muted)">학생이 없어요</div>';
}

function doSearch(q){
  const el=document.getElementById('searchResults'); if(!el) return;
  if(!q.trim()){ el.innerHTML=renderClassList(getMyClasses()); return; }
  const myClasses=getMyClasses();
  const matched=Object.values(getStudents()).filter(s=>s.status!=='withdrawn'&&myClasses.includes(s.class_id)&&(s.name.includes(q)||s.class_id.includes(q)));
  if(!matched.length){ el.innerHTML=`<div class="card" style="text-align:center;padding:30px;color:var(--muted)">"${q}" 검색 결과 없어요</div>`; return; }
  let html=`<div class="sec-div">"${q}" (${matched.length}명)</div>`;
  matched.forEach(s=>{
    const clinic=store.clinic[s.student_id]||{};
    const lvInfo=getLevelInfo(clinic.finalLevel||classifyStudent(clinic));
    html+=`<div class="search-result-item" onclick="renderStudentDetail('${s.student_id}')">
      <div class="search-avatar">${s.name[0]}</div>
      <div class="search-info"><div class="search-name">${s.name}</div><div class="search-meta">${s.class_id}</div></div>
      <div><span class="level-badge ${lvInfo.badgeCls}" style="font-size:10px">${lvInfo.label}</span></div>
    </div>`;
  });
  el.innerHTML=html;
}

        <div style="flex:1"><div style="font-size:18px;font-weight:700">${s.name}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${s.class_id} · 담임: ${teacherName}</div></div>
        <div style="text-align:right"><span class="level-badge ${lvInfo.badgeCls}">${lvInfo.label}</span>${change.text?`<div class="level-change ${change.cls}" style="margin-top:3px">${change.text}</div>`:''}</div>

function switchDetailTab(btn,panelId){
  btn.closest('.detail-tabs').querySelectorAll('.detail-tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  const sid=panelId.split('-').pop();
  ['clinic','kakao','level','memo','target'].forEach(type=>{ document.getElementById(`tab-${type}-${sid}`)?.classList.remove('on'); });
  document.getElementById(panelId)?.classList.add('on');
}

// 7일 요약
function buildWeekSummary(sid){
  const records=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k?.startsWith('se-store-')){ try{ const st=JSON.parse(localStorage.getItem(k)); const rec=st.clinic?.[sid]; if(rec) records.push({...rec,dateKey:k.replace('se-store-','')}); }catch(e){} }
  }
  if(!records.length) return '<div class="card" style="text-align:center;padding:20px;color:var(--muted)">최근 7일 기록 없어요</div>';
  const retestCount=records.filter(r=>r.retestStatus&&r.retestStatus!=='없음').length;
  const focusBad=records.filter(r=>r.focus==='산만'||r.focus==='피곤함').length;
  const levels=records.map(r=>r.finalLevel||classifyStudent(r));
  const cCount=levels.filter(l=>l==='C').length;
  const recentObs=records.slice(0,2).map(r=>[r.obs0,r.obs1,r.obs2].filter(Boolean)[0]||r.observation||'').filter(Boolean);
  return `<div class="card" style="background:linear-gradient(135deg,var(--g6),white);border:1.5px solid var(--g5)">
    <div style="font-size:11px;font-weight:700;color:var(--g3);letter-spacing:1.5px;margin-bottom:10px">최근 ${records.length}일 요약</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
      <div style="text-align:center;background:white;border-radius:10px;padding:8px"><div style="font-size:20px;font-weight:900;color:${cCount>0?'var(--red)':'var(--g3)'}">${cCount}</div><div style="font-size:10px;color:var(--muted)">🔴 특별관리</div></div>
      <div style="text-align:center;background:white;border-radius:10px;padding:8px"><div style="font-size:20px;font-weight:900;color:var(--amber)">${retestCount}</div><div style="font-size:10px;color:var(--muted)">재시험</div></div>
      <div style="text-align:center;background:white;border-radius:10px;padding:8px"><div style="font-size:20px;font-weight:900;color:${focusBad>0?'var(--amber)':'var(--g3)'}">${focusBad}</div><div style="font-size:10px;color:var(--muted)">집중 흔들림</div></div>
    </div>
    ${recentObs.length?`<div style="font-size:12px;color:var(--sub);line-height:1.7"><strong>최근 관찰:</strong><br>${recentObs.map(o=>`· ${o}`).join('<br>')}</div>`:''}
  </div>`;
}

function buildLastKakaoPreview(sid){
  const history=getHistory().filter(h=>h.student_id===sid);
  if(!history.length) return '';
  const last=history[0];
  const preview=(last.message||'').slice(0,120)+(last.message?.length>120?'...':'');
  return `<div class="card" style="border-left:3px solid var(--g4)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div style="font-size:11px;font-weight:700;color:var(--g3)">최근 상담 기록</div>
      <div style="font-size:11px;color:var(--muted)">${last.date||''}</div>
    </div>
    <div style="font-size:12px;color:var(--sub);line-height:1.7;white-space:pre-wrap">${preview}</div>
  </div>`;
}

function buildClinicHistory(sid){
  const records=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k?.startsWith('se-store-')){ try{ const st=JSON.parse(localStorage.getItem(k)); const rec=st.clinic?.[sid]; if(rec&&(rec.wordStatus||rec.obs0||rec.score)){ const dk=k.replace('se-store-',''); records.push({...rec,date:dateKeyToLabel(dk),dateKey:dk}); } }catch(e){} }
  }
  if(!records.length) return '<div class="card" style="text-align:center;padding:30px;color:var(--muted)">클리닉 기록 없어요</div>';
  records.sort((a,b)=>b.dateKey.localeCompare(a.dateKey));
  return records.map(rec=>{ const lvInfo=getLevelInfo(rec.finalLevel||classifyStudent(rec)); const obs=[rec.obs0,rec.obs1,rec.obs2].filter(Boolean).join(' / ')||rec.observation||''; return `<div class="record-item ${lvInfo.cls}"><div style="display:flex;align-items:center;justify-content:space-between"><div class="record-date">${rec.date}</div><span class="level-badge ${lvInfo.badgeCls}" style="font-size:10px">${lvInfo.label}</span></div><div class="record-content">${rec.bookName||rec.range?`📖 ${rec.bookName||''} ${rec.range||''}`:''}${rec.score?` 점수: <strong>${rec.score}</strong>`:''}${rec.wordStatus?` · ${rec.wordStatus}`:''}${obs?`<br>💬 ${obs}`:''}</div></div>`; }).join('');
}

function buildKakaoHistory(sid){
  const history=getHistory().filter(h=>h.student_id===sid);
  const counselRecords=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('se-counsel-'+sid+'-')){
      const dk=k.replace('se-counsel-'+sid+'-','');
      const text=localStorage.getItem(k);
      if(text) counselRecords.push({date_key:dk,date:dateKeyToLabel(dk),message:text,type:'counsel'});
    }
  }
  const all=[...history,...counselRecords.filter(c=>!history.some(h=>h.date_key===c.date_key&&h.type==='counsel'))];
  all.sort((a,b)=>(b.date_key||'').localeCompare(a.date_key||''));
  if(!all.length) return '<div class="card" style="text-align:center;padding:30px;color:var(--muted)">상담 기록이 없어요</div>';
  return all.map(function(h){
    const vId='cv-'+sid+'-'+h.date_key;
    const eId='ce-'+sid+'-'+h.date_key;
    const msg=(h.message||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="record-item" style="border-left-color:var(--g4);margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div class="record-date">${h.date||''}</div>
        <div style="display:flex;gap:4px">
          <button class="tbtn" onclick="editCR('${sid}','${h.date_key}')">수정</button>
          <button class="tbtn tbtn-del" onclick="deleteCR('${sid}','${h.date_key}')">삭제</button>
        </div>
      </div>
      <div id="${vId}" style="white-space:pre-wrap;font-size:12px;line-height:1.7;color:var(--sub)">${msg}</div>
      <div id="${eId}" style="display:none">
        <textarea class="counsel-ta" rows="4">${msg}</textarea>
        <div style="display:flex;gap:6px;margin-top:6px">
          <button class="tbtn" style="flex:1;background:var(--g3);color:white" onclick="saveCR('${sid}','${h.date_key}')">저장</button>
          <button class="tbtn" onclick="cancelCR('${sid}','${h.date_key}')">취소</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function editCR(sid,dk){ document.getElementById('cv-'+sid+'-'+dk).style.display='none'; document.getElementById('ce-'+sid+'-'+dk).style.display='block'; }
function cancelCR(sid,dk){ document.getElementById('cv-'+sid+'-'+dk).style.display='block'; document.getElementById('ce-'+sid+'-'+dk).style.display='none'; }
function saveCR(sid,dk){
  const ta=document.getElementById('ce-'+sid+'-'+dk)?.querySelector('textarea');
  if(!ta||!ta.value.trim()){ showToast('내용을 입력해주세요'); return; }
  const txt=ta.value.trim();
  localStorage.setItem('se-counsel-'+sid+'-'+dk, txt);
  if(hasSB()) saveCounselToSB(sid,'',dk,txt);
  document.getElementById('cv-'+sid+'-'+dk).textContent=txt;
  document.getElementById('cv-'+sid+'-'+dk).style.display='block';
  document.getElementById('ce-'+sid+'-'+dk).style.display='none';
  showToast('수정됐어요 ✓');
}
function deleteCR(sid,dk){
  if(!confirm('이 상담 기록을 삭제할까요?')) return;
  localStorage.removeItem('se-counsel-'+sid+'-'+dk);
  if(hasSB()) sb.from('counseling_records').delete().eq('student_id',sid).eq('date_key',dk).then(function(){});
  const panel=document.getElementById('tab-kakao-'+sid);
  if(panel) panel.innerHTML=buildKakaoHistory(sid);
  showToast('삭제됐어요');
}

function buildLevelHistory(sid){
  try{
    const lvHist=JSON.parse(localStorage.getItem('se-lv-hist')||'{}');
    const records=(lvHist[sid]||[]).slice().reverse();
    if(!records.length) return '<div class="card" style="text-align:center;padding:30px;color:var(--muted)">레벨 변화 기록 없어요</div>';
    let html='<div class="card"><div class="card-title">레벨 변화</div><div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">';
    records.forEach((r,i)=>{ const lvInfo=getLevelInfo(r.level); html+=`<div style="text-align:center;min-width:48px"><span class="level-badge ${lvInfo.badgeCls}" style="font-size:10px;display:block;margin-bottom:3px">${r.level}</span><div style="font-size:10px;color:var(--muted)">${(r.date||'').slice(-4)}</div></div>`; if(i<records.length-1) html+='<div style="color:var(--muted)">→</div>'; });
    html+='</div></div>';
    return html;
  }catch(e){ return ''; }
}

async function loadStudentsFromSB(){
  if(!hasSB()) return null;
  try{
    const { data, error } = await sb.from('students').select('*');
    if(error) throw error;
    const map={};
    (data||[]).forEach(s=>{ map[s.student_id]=s; });
    localStorage.setItem('se-students',JSON.stringify(map));
    return map;
  }catch(e){ console.error('학생 로드 실패:',e); return null; }
}

async function saveStudentToSB(student){
  if(!hasSB()) return false;
  try{
    // 반이 Supabase에 없으면 먼저 생성
    await sb.from('classes').upsert({
      class_id: student.class_id,
      class_name: student.class_id,
      grade: '',
      status: 'active'
    }, {onConflict:'class_id', ignoreDuplicates:true});
    const { error } = await sb.from('students').upsert({
      student_id: student.student_id,
      name: student.name,
      class_id: student.class_id,
      status: student.status||'active'
    },{onConflict:'student_id'});
    if(error) throw error;
    return true;
  }catch(e){ console.error('학생 저장 실패:',e); return false; }
}

async function loadClassesFromSB(){
  if(!hasSB()) return null;
  try{
    const { data, error } = await sb.from('classes').select('*');
    if(error) throw error;
    if(!data||data.length===0) return null;
    const map={};
    data.forEach(c=>{ map[c.class_id]=c; });
    localStorage.setItem('se-classes',JSON.stringify(map));
    return map;
  }catch(e){ console.error('반 로드 실패:',e); return null; }
}

async function saveClassToSB(cls){

}

// switchTab - 클리닉/담임 탭 전환
function switchTab(btn, prefix, cls){
  const panel = document.getElementById(`${prefix}-panel-${cssId(cls)}`);
  if(!panel) return;
  // 같은 prefix의 모든 탭/패널 off
  btn.closest('.class-tabs').querySelectorAll('.class-tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll(`[id^="${prefix}-panel-"]`).forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  panel.classList.add('on');
}

function renderStudentMgmt(){
  const students = Object.values(getStudents());
  const active = students.filter(s=>s.status==='active').sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  const paused = students.filter(s=>s.status==='paused').sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  const withdrawn = students.filter(s=>s.status==='withdrawn').sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  const showHidden = localStorage.getItem('se-show-hidden')==='1';

  let html = `<div class="sec-div">학생 관리</div>
  <div class="card"><div class="card-title">학생 추가</div>
    <div class="fg"><label>이름</label><input type="text" id="sName" placeholder="예) 김민준" autocomplete="off"></div>
    <div class="fg"><label>반</label><select id="sClass" style="width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 13px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;background:white;">${getAllClasses().map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
    <button style="width:100%;background:var(--g3);color:white;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px" onclick="addStudent()">학생 추가</button>
  </div>
  <div class="sec-div">재원 (${active.length}명)</div>`;

  active.forEach(s=>{
    const isDup = active.filter(x=>x.name===s.name).length > 1;
    html+=`<div class="teacher-card" style="${isDup?'border:1.5px solid var(--red);background:#fff5f5':''}">
      <div class="teacher-avatar" style="${isDup?'background:#fee2e2;color:var(--red)':''}">${s.name[0]}</div>
      <div class="teacher-info">
        <div class="teacher-name">${s.name}${isDup?' <span style="font-size:10px;color:red;font-weight:700">⚠️중복</span>':''}</div>
        <div class="teacher-meta">${s.class_id}</div>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">
        <button class="tbtn" onclick="renderStudentDetail('${s.student_id}')">📋</button>
        <button class="tbtn" onclick="editStudentName('${s.student_id}')">✏️</button>
        <button class="tbtn" onclick="changeStudentStatus('${s.student_id}','paused')">휴원</button>
        <button class="tbtn tbtn-del" onclick="changeStudentStatus('${s.student_id}','withdrawn')">퇴원</button>
        <button class="tbtn tbtn-del" onclick="deleteStudent('${s.student_id}','${s.name}')">삭제</button>
      </div>
    </div>`;
  });

  if(paused.length>0||withdrawn.length>0){
    html+=`<div style="text-align:center;margin:10px 0">
      <button onclick="toggleHiddenStudents()" style="background:none;border:1.5px solid var(--line);border-radius:20px;padding:6px 14px;font-size:11px;font-family:'Noto Sans KR',sans-serif;color:var(--sub);cursor:pointer;">
        ${showHidden?'▲ 휴원/퇴원생 숨기기':`▼ 휴원/퇴원생 보기 (${paused.length+withdrawn.length}명)`}
      </button>
    </div>`;
    if(showHidden){
      if(paused.length>0){
        html+=`<div class="sec-div">휴원 (${paused.length}명)</div>`;
        paused.forEach(s=>{ html+=`<div class="teacher-card" style="opacity:0.6"><div class="teacher-avatar">${s.name[0]}</div><div class="teacher-info"><div class="teacher-name">${s.name}</div><div class="teacher-meta">${s.class_id}</div></div><button class="tbtn" onclick="changeStudentStatus('${s.student_id}','active')">재활성화</button></div>`; });
      }
      if(withdrawn.length>0){
        html+=`<div class="sec-div">퇴원 (${withdrawn.length}명)</div>`;
        withdrawn.forEach(s=>{ html+=`<div class="teacher-card" style="opacity:0.4"><div class="teacher-avatar" style="background:#f3f4f6;color:#9ca3af">${s.name[0]}</div><div class="teacher-info"><div class="teacher-name">${s.name}</div><div class="teacher-meta">${s.class_id}</div></div><div style="font-size:11px;color:var(--muted)">퇴원</div></div>`; });
      }
    }
  }
  return html;
}

  const cur=localStorage.getItem('se-show-hidden')==='1';
  localStorage.setItem('se-show-hidden',cur?'0':'1');
  if(document.getElementById('screen-student').classList.contains('active')) renderStudentPage();
  else renderAdmin();
}

function setTopbar(title, backText, backFn, badge){
  const titleEl = document.getElementById('topbarTitle');

  if(titleEl) titleEl.textContent = title;
  if(backEl){ backEl.textContent = backText||'←'; backEl.onclick = backFn||showMenu; }
  if(badgeEl) badgeEl.textContent = badge||'';

function showToast(msg, duration=2000){
  let t = document.getElementById('toast');
  if(!t){
    t = document.createElement('div');
    t.id = 'toast';
    t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(12px)';
  }, duration);
}

function autoSave(elId, delay=1500){
  clearTimeout(saveTimer);
  const el = elId ? document.getElementById(elId) : null;
  if(el){ el.style.opacity='0.5'; el.textContent='저장 중...'; }
  saveTimer = setTimeout(()=>{
    saveStore();
    if(el){ el.style.opacity='1'; el.textContent='저장됨 ✓'; }
  }, delay);
}


function isAlreadyCopied(sid){
  const hist = getHistory();
  const todayKey = getWorkingDateKey();
  return hist.some(h=>h.student_id===sid&&h.date_key===todayKey);
}

function normalizeName(n){ return (n||'').replace(/\s/g,'').trim(); }

function isDuplicateStudent(name, cls){
  const students = getStudents();
  const clean = normalizeName(name);
  return Object.values(students).some(s=>
    s.class_id===cls && normalizeName(s.name)===clean && s.status!=='withdrawn'
  );
}

function addStudent(){
  const rawName = (document.getElementById('sName')?.value||'').trim();
  const name = normalizeName(rawName);
  const cls = document.getElementById('sClass')?.value;
  if(!name||!cls){ showToast('이름과 반을 입력해주세요'); return; }
  if(isDuplicateStudent(name,cls)){ showToast('이미 등록된 학생이에요 ('+cls+' '+name+')'); return; }
  const students = getStudents();
  const ids = Object.keys(students).map(k=>parseInt(k.replace('S',''))).filter(n=>!isNaN(n));
  const nextId = 'S'+String(Math.max(0,...ids)+1).padStart(3,'0');
  const newStudent = {student_id:nextId, name:name, class_id:cls, status:'active'};
  students[nextId] = newStudent;
  localStorage.setItem('se-students', JSON.stringify(students));
  if(hasSB()) saveStudentToSB(newStudent);
  showToast(name+' ('+cls+') 추가됐어요!');
  const el = document.getElementById('sName');
  if(el) el.value = '';
  if(document.getElementById('screen-student').classList.contains('active')) renderStudentPage();
  else renderAdmin();
}

        <div>🔧 <strong>원장님</strong>: 아래 초기 설정 버튼 클릭</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button onclick="document.getElementById('setupScreen').style.display='flex';document.getElementById('loginScreen').style.display='none';this.closest('[style*=fixed]').remove()" 
          style="background:var(--g3);color:white;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;">
          원장 초기 설정
        </button>
        <button onclick="this.closest('[style*=fixed]').remove()" 
          style="background:#f3f4f6;color:#374151;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;">
          닫기
        </button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function deleteStudent(sid, name){
  if(!confirm(name+' 학생을 완전히 삭제할까요?\n이 작업은 되돌릴 수 없어요.')) return;
  const students = getStudents();
  delete students[sid];
  localStorage.setItem('se-students', JSON.stringify(students));
  if(hasSB()){
    sb.from('students').delete().eq('student_id', sid).then(function(r){
      if(r.error) console.error('학생삭제실패', r.error);
    });
  }
  showToast(name + ' 삭제됐어요');
  if(document.getElementById('screen-student').classList.contains('active')) renderStudentPage();
  else renderAdmin();
}

function deleteTodayCounsel(sid){
  if(!confirm('오늘 상담 기록을 삭제할까요?')) return;
  const dateKey = getWorkingDateKey();
  localStorage.removeItem('se-counsel-'+sid+'-'+dateKey);
  if(hasSB()) sb.from('counseling_records').delete().eq('student_id',sid).eq('date_key',dateKey).then(function(r){});
  showToast('삭제됐어요');
  renderTeacher();
}

</script>
