<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>시은영어</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --g1:#0a2417;--g2:#1a5c38;--g3:#2d8a56;--g4:#52b788;--g5:#95d5b2;--g6:#d8f3dc;--g7:#f0faf2;
  --text:#0d1f15;--sub:#4a7c59;--muted:#8fb8a0;--line:#d1e8d8;--white:#fff;
  --amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;
  --lv-a:#d8f3dc;--lv-a-t:#1a5c38;--lv-a-b:#52b788;
  --lv-b:#fef3c7;--lv-b-t:#92400e;--lv-b-b:#f59e0b;
  --lv-c:#fef2f2;--lv-c-t:#991b1b;--lv-c-b:#ef4444;
  --shadow:0 2px 16px rgba(13,51,32,0.08);
  --shadow-lg:0 8px 32px rgba(13,51,32,0.12);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--g7);min-height:100vh;color:var(--text);-webkit-font-smoothing:antialiased;}

/* ===== SCREENS ===== */
.page{display:none;min-height:100vh;}
.page.active{display:block;}

/* ===== LOGIN ===== */
#pg-login{background:linear-gradient(160deg,var(--g1) 0%,var(--g2) 60%,var(--g3) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
.login-brand{text-align:center;margin-bottom:48px;}
.login-brand-main{font-family:'Gowun Dodum',sans-serif;font-size:38px;color:white;letter-spacing:-1px;}
.login-brand-sub{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:4px;margin-top:4px;}
.login-card{width:100%;max-width:340px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:32px 24px;}
.lf-label{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:1.5px;font-weight:600;margin-bottom:7px;}
.lf-input{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:12px;padding:14px 16px;font-size:15px;color:white;font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:16px;-webkit-appearance:none;}
.lf-input::placeholder{color:rgba(255,255,255,0.2);}
.lf-input:focus{border-color:var(--g4);}
.lf-btn{width:100%;background:var(--g4);color:var(--g1);border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px;}
.lf-err{font-size:12px;color:#fca5a5;text-align:center;margin-top:10px;min-height:18px;}

/* ===== TOPBAR ===== */
.topbar{background:var(--g2);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(13,51,32,0.2);}
.tb-back{background:none;border:none;color:rgba(255,255,255,0.8);font-size:22px;cursor:pointer;padding:2px 4px;line-height:1;flex-shrink:0;}
.tb-info{flex:1;min-width:0;}
.tb-title{font-size:15px;font-weight:700;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px;}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tb-badge{background:rgba(255,255,255,0.12);color:white;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.tb-logout{background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.65);font-size:11px;font-family:'Noto Sans KR',sans-serif;padding:4px 10px;border-radius:20px;cursor:pointer;}

/* ===== CONTENT ===== */
.content{padding:16px 14px 100px;}

/* ===== CARDS ===== */
.card{background:var(--white);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
.card-title{font-size:11px;font-weight:700;color:var(--g3);letter-spacing:1.5px;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.card-title::before{content:'';width:3px;height:13px;background:var(--g4);border-radius:2px;flex-shrink:0;}

/* ===== MENU ===== */
.menu-card{background:var(--white);border-radius:16px;padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;}
.menu-card:active{transform:scale(0.98);}
.menu-icon{font-size:26px;width:44px;height:44px;background:var(--g7);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.menu-info{flex:1;}
.menu-title{font-size:15px;font-weight:700;margin-bottom:2px;}
.menu-desc{font-size:12px;color:var(--muted);}
.menu-arrow{color:var(--muted);font-size:18px;}

/* ===== DATE BAR ===== */
.date-bar{background:var(--g6);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--g2);font-weight:600;margin-bottom:14px;}

/* ===== SECTION DIVIDER ===== */
.sec{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;padding:6px 0 10px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--line);}

/* ===== FORM ===== */
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:12px;color:var(--sub);font-weight:600;margin-bottom:5px;}
input[type=text],input[type=tel],input[type=password],input[type=date],select,textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 13px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;background:white;-webkit-appearance:none;transition:border-color 0.2s;}
input:focus,select:focus,textarea:focus{border-color:var(--g4);}
textarea{resize:none;line-height:1.6;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* ===== CHIPS ===== */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.chip{border:1.5px solid var(--line);background:white;border-radius:20px;padding:6px 12px;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--sub);cursor:pointer;transition:all 0.15s;font-weight:500;white-space:nowrap;}
.chip.on{border-color:var(--g4);background:var(--g6);color:var(--g2);font-weight:700;}

/* ===== CLASS TABS ===== */
.ctabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.ctabs::-webkit-scrollbar{display:none;}
.ctab{flex-shrink:0;border:1.5px solid var(--line);background:white;border-radius:20px;padding:7px 16px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--sub);cursor:pointer;font-weight:600;transition:all 0.15s;}
.ctab.on{border-color:var(--g3);background:var(--g3);color:white;}
.cpanel{display:none;}
.cpanel.on{display:block;}

/* ===== STUDENT CARD (학생관리) ===== */
.stu-card{background:white;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;}
.stu-avatar{width:42px;height:42px;border-radius:50%;background:var(--g5);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--g2);flex-shrink:0;}
.stu-info{flex:1;min-width:0;}
.stu-name{font-size:15px;font-weight:700;}
.stu-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.stu-phone{font-size:11px;color:var(--g3);margin-top:2px;font-weight:600;}
.stu-actions{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0;}

/* ===== STUDENT DETAIL (학생 상세) ===== */
.detail-hero{background:linear-gradient(135deg,var(--g1),var(--g2));border-radius:16px;padding:20px;margin-bottom:14px;color:white;}
.detail-hero-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.detail-avatar-lg{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;}
.detail-name{font-size:20px;font-weight:700;}
.detail-class{font-size:12px;color:rgba(255,255,255,0.6);margin-top:3px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.detail-info-box{background:rgba(255,255,255,0.08);border-radius:10px;padding:10px 12px;}
.detail-info-label{font-size:10px;color:rgba(255,255,255,0.45);font-weight:600;letter-spacing:1px;margin-bottom:3px;}
.detail-info-val{font-size:13px;font-weight:700;color:white;}
.detail-info-val.empty{color:rgba(255,255,255,0.3);font-weight:400;}
.detail-tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:16px;overflow-x:auto;scrollbar-width:none;}
.detail-tabs::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;padding:10px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;font-family:'Noto Sans KR',sans-serif;}
.dtab.on{color:var(--g2);border-bottom-color:var(--g3);}
.dpanel{display:none;}
.dpanel.on{display:block;}

/* ===== CLINIC CARD ===== */
.clinic-card{background:var(--g7);border-radius:14px;margin-bottom:10px;border:1.5px solid var(--g6);overflow:hidden;transition:border-color 0.2s;}
.clinic-card.filled{border-color:var(--g5);}
.cc-head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;}
.cc-name{font-size:15px;font-weight:700;flex:1;}
.cc-badge{background:var(--g5);color:var(--g1);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.cc-dot{width:8px;height:8px;border-radius:50%;background:var(--line);flex-shrink:0;}
.cc-dot.done{background:var(--g4);}
.cc-body{padding:0 16px 16px;display:none;}
.cc-body.open{display:block;}

/* ===== LEVEL BADGE ===== */
.lv{font-size:11px;font-weight:700;border-radius:20px;padding:4px 10px;white-space:nowrap;}
.lv.a{background:var(--lv-a);color:var(--lv-a-t);}
.lv.b{background:var(--lv-b);color:var(--lv-b-t);}
.lv.c{background:var(--lv-c);color:var(--lv-c-t);}

/* ===== TEACHER STATUS CARD ===== */
.tc-card{background:white;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border-left:4px solid var(--line);}
.tc-card.a{border-left-color:var(--lv-a-b);}
.tc-card.b{border-left-color:var(--lv-b-b);}
.tc-card.c{border-left-color:var(--lv-c-b);}
.tc-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.tc-avatar{width:36px;height:36px;border-radius:50%;background:var(--g5);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--g2);flex-shrink:0;}

/* ===== STAT GRID ===== */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px;}
.stat-num{font-size:26px;font-weight:900;color:var(--g3);text-align:center;}
.stat-label{font-size:11px;color:var(--muted);text-align:center;margin-top:2px;}

/* ===== BTNS ===== */
.btn{border:none;border-radius:10px;padding:9px 14px;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;}
.btn-g{background:var(--g6);color:var(--g2);}
.btn-g2{background:var(--g3);color:white;}
.btn-red{background:#fef2f2;color:#991b1b;}
.btn-gray{background:#f3f4f6;color:#4b5563;}
.btn-amber{background:#fef3c7;color:#92400e;}
.bottom-btn{position:fixed;bottom:0;left:0;right:0;background:var(--g3);color:white;border:none;padding:18px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;z-index:50;box-shadow:0 -4px 20px rgba(13,51,32,0.15);}
.bottom-btn:active{background:var(--g2);}
.bottom-btn:disabled{background:var(--muted);}

/* ===== HISTORY ===== */
.hist-item{background:white;border-radius:12px;padding:14px;margin-bottom:8px;box-shadow:var(--shadow);}
.hist-date{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px;}
.hist-msg{font-size:12px;color:var(--sub);line-height:1.6;}

/* ===== RECORD ITEM ===== */
.rec-item{background:white;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border-left:4px solid var(--line);}
.rec-item.a{border-left-color:var(--lv-a-b);}
.rec-item.b{border-left-color:var(--lv-b-b);}
.rec-item.c{border-left-color:var(--lv-c-b);}
.rec-date{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px;}
.rec-content{font-size:12px;color:var(--sub);line-height:1.7;}

/* ===== MODAL ===== */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;display:flex;align-items:flex-end;}
.modal-box{background:white;border-radius:24px 24px 0 0;padding:28px 22px 44px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px;text-align:center;}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:white;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ===== LOADING ===== */
.loading{text-align:center;padding:50px 20px;}
.spinner{width:32px;height:32px;border:3px solid var(--g6);border-top-color:var(--g4);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== PROGRESS ===== */
.prog-wrap{display:flex;align-items:center;gap:8px;}
.prog-bar{flex:1;height:5px;background:var(--line);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--g4);border-radius:3px;transition:width 0.3s;}

/* ===== SEARCH ===== */
.search-wrap{position:relative;margin-bottom:14px;}
.search-input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 16px 12px 42px;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.search-input:focus{border-color:var(--g4);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}

/* ===== INFO NOTE ===== */
.info-note{background:linear-gradient(135deg,var(--g6),#fef9f0);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--g2);line-height:1.7;margin-bottom:14px;border-left:3px solid var(--g4);}

/* ===== OBS HINTS ===== */
.obs-hints{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
.obs-hint{background:var(--g6);color:var(--g2);border:none;border-radius:20px;padding:5px 10px;font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* ===== DATE SELECTOR ===== */
.date-sel{background:white;border-radius:12px;padding:10px 14px;margin-bottom:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.date-sel-label{font-size:12px;font-weight:700;color:var(--sub);}
.date-btn{border:1.5px solid var(--line);background:white;border-radius:20px;padding:5px 12px;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--sub);cursor:pointer;font-weight:500;}
.date-btn.on{border-color:var(--g3);background:var(--g3);color:white;font-weight:700;}

@media(max-width:480px){
  .row2{grid-template-columns:1fr;}
  .stat-grid{gap:6px;}
  .stat-num{font-size:22px;}
}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ===== LOGIN ===== -->
<div class="page active" id="pg-login">
  <div class="login-brand">
    <div class="login-brand-main">시은영어</div>
    <div class="login-brand-sub">학생 성장 기록 시스템</div>
  </div>
  <div class="login-card">
    <div class="lf-label">아이디</div>
    <input class="lf-input" type="text" id="loginId" placeholder="아이디 입력" autocomplete="off" autocapitalize="none"
      onkeydown="if(event.key==='Enter') document.getElementById('loginPin').focus()">
    <div class="lf-label">PIN (4자리)</div>
    <input class="lf-input" type="password" id="loginPin" placeholder="●●●●" maxlength="4" inputmode="numeric"
      style="letter-spacing:8px;font-size:20px;text-align:center"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="lf-btn" onclick="doLogin()">로그인</button>
    <div class="lf-err" id="loginErr"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div class="page" id="pg-app">
  <div class="topbar">
    <button class="tb-back" id="tbBack" onclick="goBack()">☰</button>
    <div class="tb-info">
      <div class="tb-title" id="tbTitle">시은영어</div>
      <div class="tb-sub" id="tbSub"></div>
    </div>
    <div class="tb-right">
      <div class="tb-badge" id="tbBadge"></div>
      <button class="tb-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<script>
// ============================================================
// SUPABASE 설정 — 단일 진실 소스
// localStorage 없음. 모든 데이터는 Supabase에서 온다.
// ============================================================
const SB_URL = 'https://izmxzjvnjjsuhqpasgxi.supabase.co';
const SB_KEY = 'sb_publishable_0mEDpGFtxKBizgIkwD66_Q_fpqpoR5n';
let sb = null;

// ===== STATE =====
let CU = null; // currentUser
let STORE = { clinic:{}, teacher:{} };
let selectedDate = null; // null = 오늘
let navStack = [];
let saveTimer = null;

// ===== INIT =====
window.addEventListener('load', function(){
  try{
    if(typeof supabase !== 'undefined'){
      sb = supabase.createClient(SB_URL, SB_KEY);
    }
  }catch(e){ console.error('Supabase 초기화 실패:', e); }

  // 세션 복원
  try{
    const sess = JSON.parse(localStorage.getItem('se-session')||'{}');
    if(sess.user && sess.expires && Date.now() < sess.expires){
      CU = sess.user;
      enterApp();
      return;
    }
  }catch(e){}
});

// ===== UTILS =====
function today(){ const d=new Date(); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; }
function yesterday(){ const d=new Date(); d.setDate(d.getDate()-1); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; }
function dateLabel(key){ if(!key||key.length!==8) return key; return `${parseInt(key.slice(4,6))}월 ${parseInt(key.slice(6,8))}일`; }
function todayLabel(){ const d=new Date(); const days=['일','월','화','수','목','금','토']; return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`; }
function workDate(){ return selectedDate || today(); }
function workLabel(){ return selectedDate ? dateLabel(selectedDate) : todayLabel(); }
function isCRT(){ return [4,5,6].includes(new Date().getDay()); }
function cssId(s){ return s.replace(/[\s]/g,'-'); }
function norm(s){ return (s||'').replace(/\s/g,'').trim(); }

function toast(msg, dur=2200){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'), dur);
}

function setTopbar(title, backFn, badge){
  document.getElementById('tbTitle').textContent = title;
  document.getElementById('tbSub').textContent = workLabel();
  document.getElementById('tbBadge').textContent = badge||CU?.name||'';
  const btn = document.getElementById('tbBack');
  btn.textContent = backFn ? '←' : '☰';
  btn.onclick = backFn || showMenu;
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function render(html){ document.getElementById('mainContent').innerHTML = html; }

function goBack(){
  if(navStack.length===0){ showMenu(); return; }
  navStack.pop()();
}

// ===== AUTH =====
async function doLogin(){
  console.log('doLogin 실행됨');
  const errEl = document.getElementById('loginErr');
  if(errEl){ errEl.textContent='로그인 시도 중...'; errEl.style.color='var(--g4)'; }
  const id = String(document.getElementById('loginId').value||'').trim();
  const pin = String(document.getElementById('loginPin').value||'').trim();
  const err = msg=>{ if(errEl){ errEl.textContent=msg; errEl.style.color='#fca5a5'; } };

  if(!id){ err('아이디를 입력해주세요'); return; }
  if(!pin){ err('PIN을 입력해주세요'); return; }
  if(!sb){ err('서버 연결 실패. 새로고침 해주세요'); return; }

  if(errEl){ errEl.textContent='staff 조회 중...'; errEl.style.color='var(--g4)'; }
  try{
    const {data:staffList,error} = await sb.from('staff').select('*').eq('active',true);
    if(error){ err('DB 오류: '+error.message); return; }
    if(errEl){ errEl.textContent='staff 조회 완료: '+(staffList?staffList.length:0)+'명'; errEl.style.color='var(--g4)'; }

    // 상세 디버그
    const inputId = String(id).trim();
    const inputPin = String(pin).trim();
    console.log('입력 id:', inputId, '/ pin:', inputPin, '/ pin길이:', inputPin.length);
    (staffList||[]).forEach(t=>{
      const lid = String(t.login_id||'').trim();
      const lpin = String(t.pin||'').trim();
      const idMatch = lid === inputId;
      const pinMatch = lpin === inputPin;
      console.log(t.name, '| id일치:', idMatch, '| pin일치:', pinMatch, '| lid:', lid, '| lpin길이:', lpin.length);
    });

    const data = (staffList||[]).find(t=>
      String(t.login_id||'').trim() === inputId &&
      String(t.pin||'').trim() === inputPin
    );

    if(!data){
      const ids = (staffList||[]).map(t=>String(t.login_id||'').trim()).join(', ');
      err('매칭 실패. 조회된 아이디: '+ids);
      return;
    }
    CU = { id:data.id, name:data.name, role:data.role, classes:data.classes||[], loginId:data.login_id };
    localStorage.setItem('se-session', JSON.stringify({ user:CU, expires: Date.now()+24*60*60*1000 }));
    enterApp();
  }catch(e){ err('로그인 실패: '+e.message); console.error(e); }
}

// ===== CLINIC 데이터 로드 =====
async function loadTodayClinic(){
  if(!sb) return;
  try{
    const {data} = await sb.from('clinic_records').select('*').eq('date_key', workDate());
    if(data){ data.forEach(r=>{ STORE.clinic[r.student_id]={ bookName:r.book_name,range:r.range,score:r.score,wordStatus:r.word_status,retestStatus:r.retest_status,focus:r.focus,obs0:r.obs0,obs1:r.obs1,obs2:r.obs2,observation:r.observation,obsTags:r.obs_tags||[],crtScore:r.crt_score,finalLevel:r.final_level }; }); }
  }catch(e){ console.error('클리닉 로드 실패',e); }
}

// ===== STUDENTS =====
async function getStudents(includeWithdrawn=false){
  if(!sb) return {};
  try{
    let q = sb.from('students').select('*');
    if(!includeWithdrawn) q = q.neq('status','withdrawn');
    const {data,error} = await q;
    if(error) throw error;
    const map={};
    (data||[]).forEach(s=>{ map[s.student_id]=s; });
    return map;
  }catch(e){ console.error('학생 로드 실패',e); return {}; }
}

async function getActiveStudents(){
  const all = await getStudents();
  const active={};
  Object.entries(all).forEach(([k,v])=>{ if(v.status==='active') active[k]=v; });
  return active;
}

async function getStudentsByClass(cls){
  if(!sb) return [];
  try{
    const {data} = await sb.from('students').select('*').eq('class_id',cls).eq('status','active');
    return data||[];
  }catch(e){ return []; }
}

// ===== CLASSES =====
async function getClasses(){
  if(!sb) return [];
  try{
    const {data} = await sb.from('classes').select('*').eq('status','active').order('class_id');
    return (data||[]).map(c=>c.class_id);
  }catch(e){ return []; }
}

function getMyClasses(){
  if(!CU) return [];
  if(['admin','clinic','manager'].includes(CU.role)) return null; // null = 전체
  return CU.classes||[];
}

async function resolveClasses(){
  const mine = getMyClasses();
  if(mine===null) return await getClasses();
  return mine;
}

// ===== LEVEL =====
function classify(clinic){
  const w=clinic?.wordStatus||'', r=clinic?.retestStatus||'', f=clinic?.focus||'', o=clinic?.observation||'';
  const danger=['멈춤','흔들림','산만','시간 부족','안 떠올림','반복','피곤','막힘','끊'];
  const hasDanger=danger.some(d=>o.includes(d));
  if(w==='미흡'||r==='3차 완료'||f==='산만'||(r==='2차 완료'&&hasDanger)) return 'C';
  if(w==='재시험 필요'||r==='1차 완료'||r==='2차 완료'||f==='보통'||f==='피곤함'||hasDanger) return 'B';
  return 'A';
}
function lvInfo(l){ return { A:{label:'🟢 안정',cls:'a',meaning:'오늘 흐름 안정.',action:'그대로 진행'}, B:{label:'🟡 유지 필요',cls:'b',meaning:'약간 흔들림.',action:'다음 수업 1회 확인'}, C:{label:'🔴 특별 관리',cls:'c',meaning:'반복 흔들림.',action:'30분 단위 리셋'} }[l]||{label:'🟡 유지 필요',cls:'b',meaning:'',action:''}; }
function isFilled(sid){ const r=STORE.clinic[sid]||{}; return !!(r.bookName||r.score||r.wordStatus||r.focus||r.obs0||(r.obsTags&&r.obsTags.length)); }

function buildClinicCard(s, cls){

      <div class="fg"><label>재시험</label><div class="chips">${['없음','1차 완료','2차 완료','3차 완료'].map(v=>`<button class="chip ${rec.retestStatus===v?'on':''}" onclick="cchip('${sid}','retestStatus','${v}',this)">${v}</button>`).join('')}</div></div>
      <div class="fg"><label>집중도</label><div class="chips">${['좋음','보통','산만','피곤함'].map(v=>`<button class="chip ${rec.focus===v?'on':''}" onclick="cchip('${sid}','focus','${v}',this)">${v}</button>`).join('')}</div></div>
      ${isCRT()?`<div class="fg"><label>CRT 점수</label><input type="text" id="cs-${sid}" value="${rec.crtScore||''}" placeholder="예) 42/50" oninput="ci('${sid}')"></div>`:''}

        <label>관찰 태그 <span style="color:var(--muted);font-weight:400">(최대 2개)</span></label>

      </div>

        <label>관찰 메모 (최대 3개)</label>
        <div class="obs-hints">${hints.map(h=>`<button class="obs-hint" onclick="setObs('${sid}','${h}')">${h}</button>`).join('')}</div>
        ${[0,1,2].map(n=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:11px;color:var(--muted);flex-shrink:0">${n+1}</span><input type="text" id="ob${n}-${sid}" maxlength="50" value="${rec['obs'+n]||''}" placeholder="${n===0?'예) 문장 읽다 멈춤':n===1?'예) 후반 집중 흔들림':'추가 관찰 (선택)'}" oninput="cobs('${sid}')" style="flex:1;border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;"></div>`).join('')}

function toggleCC(sid){ document.getElementById('cb-'+sid)?.classList.toggle('open'); }

function ci(sid){
  ensC(sid);
  STORE.clinic[sid].bookName=document.getElementById('bk-'+sid)?.value||'';
  STORE.clinic[sid].range=document.getElementById('rg-'+sid)?.value||'';
  STORE.clinic[sid].score=document.getElementById('sc-'+sid)?.value||'';
  STORE.clinic[sid].crtScore=document.getElementById('cs-'+sid)?.value||'';
  updCS(sid);
}
function cobs(sid){
  ensC(sid);
  const o0=document.getElementById('ob0-'+sid)?.value||'';
  const o1=document.getElementById('ob1-'+sid)?.value||'';
  const o2=document.getElementById('ob2-'+sid)?.value||'';
  STORE.clinic[sid].obs0=o0.slice(0,50);
  STORE.clinic[sid].obs1=o1.slice(0,50);
  STORE.clinic[sid].obs2=o2.slice(0,50);
  STORE.clinic[sid].observation=[o0,o1,o2].filter(Boolean).join(' / ');
  updCS(sid);
}
function cchip(sid,f,v,btn){
  btn.closest('.chips').querySelectorAll('.chip').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ensC(sid); STORE.clinic[sid][f]=v; updCS(sid);
}
function ctag(sid,v,btn){
  ensC(sid);
  if(!STORE.clinic[sid].obsTags) STORE.clinic[sid].obsTags=[];
  const arr=STORE.clinic[sid].obsTags;
  const idx=arr.indexOf(v);
  if(idx>-1){ arr.splice(idx,1); btn.classList.remove('on'); }
  else{ if(arr.length>=2){ toast('최대 2개까지 선택할 수 있어요'); return; } arr.push(v); btn.classList.add('on'); }
  updCS(sid);
}
function setObs(sid,text){
  for(let n=0;n<3;n++){ const el=document.getElementById(`ob${n}-${sid}`); if(el&&!el.value){ el.value=text; cobs(sid); return; } }
  const el=document.getElementById('ob2-'+sid); if(el){ el.value=text; cobs(sid); }
}
function ensC(sid){ if(!STORE.clinic[sid]) STORE.clinic[sid]={}; }
function updCS(sid){
  const done=isFilled(sid);
  document.getElementById('cc-'+sid)?.classList.toggle('filled',done);
  document.getElementById('cd-'+sid)?.classList.toggle('done',done);
}

async function saveClinic(){
  if(!sb){ toast('서버 연결 안됨'); return; }
  const btn=document.querySelector('.bottom-btn');
  if(btn){ btn.textContent='저장 중...'; btn.disabled=true; }
  try{
    const entries=Object.entries(STORE.clinic).filter(([,r])=>r&&Object.keys(r).length>0);
    const upserts=entries.map(([sid,rec])=>({
      student_id:sid, date_key:workDate(),
      book_name:rec.bookName||'', range:rec.range||'', score:rec.score||'',
      word_status:rec.wordStatus||'', retest_status:rec.retestStatus||'',
      focus:rec.focus||'', obs0:rec.obs0||'', obs1:rec.obs1||'', obs2:rec.obs2||'',
      observation:rec.observation||'', obs_tags:rec.obsTags||[],
      crt_score:rec.crtScore||'', final_level:rec.finalLevel||classify(rec),
      updated_at:new Date().toISOString()
    }));
    if(upserts.length===0){ toast('입력된 데이터가 없어요'); if(btn){btn.textContent='✓ 오늘 기록 저장 완료';btn.disabled=false;} return; }
    const {error}=await sb.from('clinic_records').upsert(upserts,{onConflict:'student_id,date_key'});
    if(error) throw error;
    toast(`${upserts.length}명 저장됐어요 ✓`);
    if(btn){btn.textContent='✓ 저장완료';btn.style.background='var(--g4)';}
  }catch(e){ toast('저장 실패. 다시 시도해주세요'); console.error(e); if(btn){btn.textContent='✓ 오늘 기록 저장 완료';btn.disabled=false;} }
}

// ===== EXCEL =====
async function handleExcel(e){
  const file=e.target.files[0]; if(!file) return;
  const resultEl=document.getElementById('xlsxResult');
  resultEl.style.display='block'; resultEl.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const reader=new FileReader();
  reader.onload=async function(ev){
    try{
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

      const students=await getStudents();
      const nameMap={};
      Object.values(students).forEach(s=>{ if(s.status!=='withdrawn'){ nameMap[norm(s.name)+'_'+s.class_id]=s.student_id; nameMap[norm(s.name)]=s.student_id; } });

      const startRow=rows[0]&&String(rows[0][0]).includes('학생')?1:0;
      let matched=0, errors=[], created=[];
      const upserts=[];

      rows.slice(startRow).forEach((row)=>{
        if(!row||!row[0]) return;
        // 첫 셀이 날짜인지 감지
        const f0=String(row[0]||'');
        const hasDate=/^\d{4}/.test(f0)||/^\d{2}[.\-\/]/.test(f0)||f0.includes('월')||f0.includes('-');
        const ni=hasDate?1:0;
        const ci=hasDate?2:1;
        const name=norm(String(row[ni]||'').trim());
        const cls=String(row[ci]||'').trim();
        if(!name) return;

        // student_id 찾기
        let sid=nameMap[name+'_'+cls]||nameMap[name];
        if(!sid){
          errors.push(`${name} (${cls||'반 미입력'}) - 매칭 실패`);
          return;
        }

        const o=hasDate?1:0;
        const rec={
          student_id:sid, date_key:workDate(),
          book_name:String(row[3+o]||'').trim(),
          range:String(row[4+o]||'').trim(),
          score:String(row[5+o]||'').trim(),
          retest_status:String(row[6+o]||'').trim(),
          obs0:String(row[7+o]||'').trim().slice(0,50),
          obs1:String(row[8+o]||'').trim().slice(0,50),
          obs2:String(row[9+o]||'').trim().slice(0,50),
          crt_yn:String(row[10+o]||'').trim(),
          crt_score:String(row[11+o]||'').trim(),
          updated_at:new Date().toISOString()
        };
        // 단어상태 자동판단
        const rt=rec.retest_status;
        rec.word_status=(!rt||rt==='없음'||rt==='-')?'통과':(rt.includes('있음')||rt.includes('재'))?'재시험 필요':rt;
        // observation 합치기
        rec.observation=[rec.obs0,rec.obs1,rec.obs2].filter(Boolean).join(' / ');
        rec.obs_tags=[];
        rec.focus='';
        // STORE에도 반영
        STORE.clinic[sid]={bookName:rec.book_name,range:rec.range,score:rec.score,wordStatus:rec.word_status,retestStatus:rec.retest_status,focus:rec.focus,obs0:rec.obs0,obs1:rec.obs1,obs2:rec.obs2,observation:rec.observation,obsTags:[],crtScore:rec.crt_score};
        STORE.clinic[sid].finalLevel=classify(STORE.clinic[sid]);
        rec.final_level=STORE.clinic[sid].finalLevel;
        upserts.push(rec);
        matched++;
      });

      // Supabase 저장
      if(upserts.length>0 && sb){
        const {error}=await sb.from('clinic_records').upsert(upserts,{onConflict:'student_id,date_key'});
        if(error) throw error;
      }

      let html=`<div style="color:var(--g2);font-weight:700;margin-bottom:6px">✅ ${matched}명 반영됐어요!</div>`;
      if(errors.length>0){
        html+=`<div style="color:var(--red);font-weight:600;margin-bottom:4px">⚠️ 매칭 실패 ${errors.length}건</div>`;
        html+=errors.map(e=>`<div style="color:var(--red)">· ${e}</div>`).join('');
      }
      resultEl.innerHTML=html;
      toast(`${matched}명 엑셀 반영 완료!`);
      renderClinic();
    }catch(err){
      console.error(err);
      resultEl.innerHTML=`<div style="color:var(--red)">파일을 읽지 못했어요: ${err.message}</div>`;
      toast('파일 읽기 실패');
    }
  };
  reader.readAsArrayBuffer(file);
}

async function dlTemplate(){
  if(typeof XLSX==='undefined'){ toast('잠시 후 다시 시도해주세요'); return; }
  const students=Object.values(await getStudents()).filter(s=>s.status==='active');
  const rows=[['날짜','학생명','반','단어교재','단어범위','단어점수','재시험','관찰1','관찰2','관찰3','CRT여부','CRT점수'],
    ...students.map(s=>[workLabel(),s.name,s.class_id,'','','','없음','','','','없음',''])];

  const wbk=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wbk,ws,'클리닉');

  toast('양식 다운로드됐어요!');
}

const counselTimers={};
function autoSaveCounsel(sid,cls,el){
  const st=document.getElementById('cs-st-'+sid);
  if(st) st.textContent='입력 중...';
  clearTimeout(counselTimers[sid]);
  counselTimers[sid]=setTimeout(async()=>{
    const text=el.value.trim();
    if(!text){ if(st) st.textContent=''; return; }
    if(!sb){ if(st) st.textContent='서버 연결 안됨'; return; }
    try{
      await sb.from('counseling_records').upsert({student_id:sid,class_id:cls,date_key:workDate(),content:text,updated_at:new Date().toISOString()},{onConflict:'student_id,date_key'});
      if(st){ st.textContent='✓ 저장됨'; st.style.color='var(--g3)'; }
      el.style.borderColor='var(--g4)'; el.style.background='#f0fdf4';
    }catch(e){ if(st) st.textContent='저장 실패'; console.error(e); }
  },1500);
}

  const showHidden=localStorage.getItem('se-sh')==='1';

  let html=`<button onclick="openAddStudent()" class="btn btn-g2" style="width:100%;padding:14px;font-size:15px;margin-bottom:14px;border-radius:12px">+ 학생 추가</button>
  <div class="sec">재원 (${active.length}명)</div>`;

  active.forEach(s=>{
    const isDup=active.filter(x=>x.name===s.name).length>1;
    html+=`<div class="stu-card" ${isDup?'style="border:1.5px solid var(--red)"':''}>
      <div class="stu-avatar">${s.name[0]}</div>
      <div class="stu-info">

        <div class="stu-meta">${s.class_id}</div>
        ${s.parent_phone?`<div class="stu-phone">👨 ${s.parent_phone}</div>`:''}
        ${s.student_phone?`<div class="stu-phone">📱 ${s.student_phone}</div>`:''}
      </div>
      <div class="stu-actions">
        <button class="btn btn-g" onclick="renderStudentDetail('${s.student_id}')">📋</button>
        <button class="btn btn-g" onclick="editStudentName('${s.student_id}')">✏️</button>
        <button class="btn btn-gray" onclick="chgStatus('${s.student_id}','paused')">휴원</button>
        <button class="btn btn-red" onclick="chgStatus('${s.student_id}','withdrawn')">퇴원</button>
        <button class="btn btn-g" onclick="editPhone('${s.student_id}')">전화</button>
        <button class="btn btn-red" onclick="delStudent('${s.student_id}','${s.name}')">삭제</button>
      </div>
    </div>`;
  });

  if(paused.length>0||withdrawn.length>0){
    html+=`<div style="text-align:center;margin:10px 0">
      <button onclick="toggleHidden()" class="btn btn-gray">${showHidden?'▲ 숨기기':`▼ 휴원/퇴원 보기 (${paused.length+withdrawn.length}명)`}</button>
    </div>`;
    if(showHidden){
      if(paused.length>0){
        html+=`<div class="sec">휴원 (${paused.length}명)</div>`;
        paused.forEach(s=>html+=`<div class="stu-card" style="opacity:0.6"><div class="stu-avatar">${s.name[0]}</div><div class="stu-info"><div class="stu-name">${s.name}</div><div class="stu-meta">${s.class_id}</div></div><button class="btn btn-g" onclick="chgStatus('${s.student_id}','active')">재활성화</button></div>`);
      }
      if(withdrawn.length>0){
        html+=`<div class="sec">퇴원 (${withdrawn.length}명)</div>`;
        withdrawn.forEach(s=>html+=`<div class="stu-card" style="opacity:0.4"><div class="stu-avatar" style="background:#f3f4f6;color:#9ca3af">${s.name[0]}</div><div class="stu-info"><div class="stu-name">${s.name}</div><div class="stu-meta">${s.class_id}</div></div><span style="font-size:11px;color:var(--muted)">퇴원</span></div>`);
      }
    }
  }
  render(html);
}

async function chgStatus(sid,status){

  toast(`${labels[status]} 처리됐어요`);
  renderStudentMgmt();
}

async function addStudent(){
  const name=norm(document.getElementById('as-name')?.value||'');
  const cls=document.getElementById('as-cls')?.value;
  const stuPhone=(document.getElementById('as-stu')?.value||'').trim();
  const parPhone=(document.getElementById('as-par')?.value||'').trim();
  if(!name||!cls){ toast('이름과 반을 입력해주세요'); return; }
  if(!sb){ toast('서버 연결 안됨'); return; }
  // 중복 체크
  const {data:dup}=await sb.from('students').select('student_id').eq('name',name).eq('class_id',cls).neq('status','withdrawn');
  if(dup&&dup.length>0){ toast('이미 등록된 학생이에요'); return; }
  // ID 생성
  const {data:all}=await sb.from('students').select('student_id');
  const ids=(all||[]).map(s=>parseInt(s.student_id.replace('S',''))).filter(n=>!isNaN(n));
  const newId=`S${String(Math.max(0,...ids)+1).padStart(3,'0')}`;
  const {error}=await sb.from('students').insert({student_id:newId,name,class_id:cls,status:'active',student_phone:stuPhone,parent_phone:parPhone});
  if(error){ toast('추가 실패: '+error.message); return; }
  toast(`${name} (${cls}) 추가됐어요!`);
  closeModal();
  renderStudentMgmt();
}

        <span class="lv ${lvi3.cls}" style="font-size:10px">${lvi3.label}</span>
      </div>
      <div class="rec-content">
        ${r.book_name?`📖 ${r.book_name} ${r.range||''}`:''}
        ${r.score?` · 점수: <strong>${r.score}</strong>`:''}
        ${r.word_status?` · ${r.word_status}`:''}
        ${obs?`<br>💬 ${obs}`:''}
      </div>
    </div>`;
  });
  if(!clinicHist||clinicHist.length===0) html+=`<div style="text-align:center;padding:30px;color:var(--muted)">클리닉 기록 없어요</div>`;
  html+=`</div>`;

  // 상담 기록
  html+=`<div class="dpanel" id="dt-counsel-${sid}">`;
  (counselHist||[]).forEach(h=>{
    html+=`<div class="hist-item">
      <div class="hist-date">${dateLabel(h.date_key)}</div>
      <div class="hist-msg" style="white-space:pre-wrap">${(h.content||'').replace(/</g,'&lt;')}</div>
    </div>`;
  });
  if(!counselHist||counselHist.length===0) html+=`<div style="text-align:center;padding:30px;color:var(--muted)">상담 기록 없어요</div>`;
  html+=`</div>`;

  // 메모
  const {data:memoRows}=await sb.from('student_memos').select('*').eq('student_id',sid).catch(()=>({data:[]}));
  const memo=memoRows&&memoRows[0];
  html+=`<div class="dpanel" id="dt-memo-${sid}">
    <div class="card">
      <div class="card-title">학부모 메모</div>
      <textarea id="memo-par-${sid}" rows="3" placeholder="학부모 특이사항, 성향 등" style="width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;resize:none">${memo?.parent_note||''}</textarea>
    </div>
    <div class="card">
      <div class="card-title">학생 메모</div>
      <textarea id="memo-stu-${sid}" rows="3" placeholder="학생 특이사항, 약점 등" style="width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;resize:none">${memo?.student_note||''}</textarea>
    </div>
    <button onclick="saveMemo('${sid}')" class="btn btn-g2" style="width:100%;padding:14px">💾 메모 저장</button>
  </div>`;

  render(html);
  navStack.pop(); // 중복 push 방지
}

function dtab(btn,panelId){
  btn.closest('.detail-tabs').querySelectorAll('.dtab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  const sid=panelId.split('-').pop();
  ['clinic','counsel','memo'].forEach(type=>{
    document.getElementById(`dt-${type}-${sid}`)?.classList.remove('on');
  });
  document.getElementById(panelId)?.classList.add('on');
}

async function saveMemo(sid){
  const par=document.getElementById('memo-par-'+sid)?.value||'';
  const stu=document.getElementById('memo-stu-'+sid)?.value||'';
  const {error}=await sb.from('student_memos').upsert({student_id:sid,parent_note:par,student_note:stu,updated_at:new Date().toISOString()},{onConflict:'student_id'});
  if(error){ toast('저장 실패'); return; }
  toast('메모 저장됐어요 ✓');
}

// ===== SEARCH =====
async function renderSearch(){
  setTopbar('학생 검색', showMenu);
  const classes=await resolveClasses();
  const allStudents=await getStudents();

  let html=`<div class="search-wrap"><span class="search-icon">🔍</span><input type="text" class="search-input" id="srchInput" placeholder="학생 이름 또는 반 입력..." oninput="doSearch(this.value)" autocomplete="off"></div><div id="srchRes">`;

  classes.forEach(cls=>{
    const studs=Object.values(allStudents).filter(s=>s.class_id===cls&&s.status==='active');
    if(!studs.length) return;
    html+=`<div class="sec">${cls} (${studs.length}명)</div>`;
    studs.forEach(s=>{
      const lvi2=lvInfo(STORE.clinic[s.student_id]?.finalLevel||classify(STORE.clinic[s.student_id]||{}));
      html+=`<div class="stu-card" onclick="renderStudentDetail('${s.student_id}')">
        <div class="stu-avatar">${s.name[0]}</div>
        <div class="stu-info"><div class="stu-name">${s.name}</div><div class="stu-meta">${cls} · ${isFilled(s.student_id)?'✅ 입력':'⬜ 미입력'}</div></div>
        <span class="lv ${lvi2.cls}">${lvi2.label}</span>
      </div>`;
    });
  });
  html+=`</div>`;
  render(html);
  setTimeout(()=>document.getElementById('srchInput')?.focus(),100);
}

async function doSearch(q){
  const el=document.getElementById('srchRes'); if(!el) return;
  if(!q.trim()){ renderSearch(); return; }
  const allStudents=await getStudents();
  const matched=Object.values(allStudents).filter(s=>s.status!=='withdrawn'&&(s.name.includes(q)||s.class_id.includes(q)));
  if(!matched.length){ el.innerHTML=`<div style="text-align:center;padding:30px;color:var(--muted)">"${q}" 검색 결과 없어요</div>`; return; }
  let html=`<div class="sec">"${q}" (${matched.length}명)</div>`;
  matched.forEach(s=>{
    const lvi2=lvInfo(STORE.clinic[s.student_id]?.finalLevel||classify(STORE.clinic[s.student_id]||{}));
    html+=`<div class="stu-card" onclick="renderStudentDetail('${s.student_id}')">
      <div class="stu-avatar">${s.name[0]}</div>
      <div class="stu-info"><div class="stu-name">${s.name}</div><div class="stu-meta">${s.class_id}</div></div>
      <span class="lv ${lvi2.cls}">${lvi2.label}</span>
    </div>`;
  });
  el.innerHTML=html;
}

// ===== HISTORY =====
async function renderHistory(){
  setTopbar('발송 기록', showMenu);
  render(`<div class="loading"><div class="spinner"></div></div>`);
  const {data}=await sb.from('counseling_records').select('*').order('date_key',{ascending:false}).order('updated_at',{ascending:false}).limit(200);
  const {data:studs}=await sb.from('students').select('student_id,name');
  const nameMap={};
  (studs||[]).forEach(s=>nameMap[s.student_id]=s.name);

  let html=`<div class="date-bar">📜 발송/상담 기록</div>`;
  if(!data||data.length===0){ html+=`<div class="card" style="text-align:center;padding:40px;color:var(--muted)">기록이 없어요</div>`; render(html); return; }

  const byDate={};
  data.forEach(h=>{ const d=dateLabel(h.date_key)||h.date_key; if(!byDate[d]) byDate[d]=[]; byDate[d].push(h); });
  Object.entries(byDate).forEach(([date,items])=>{
    html+=`<div class="sec">${date}</div>`;
    items.forEach(h=>{
      const preview=(h.content||'').slice(0,80)+((h.content||'').length>80?'...':'');
      html+=`<div class="hist-item" style="cursor:pointer" onclick="renderStudentDetail('${h.student_id}')">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <div style="font-size:14px;font-weight:700">${nameMap[h.student_id]||h.student_id}</div>
          <div class="hist-date">${date}</div>
        </div>
        <div class="hist-msg">${preview}</div>
      </div>`;
    });
  });
  render(html);
}

// ===== ADMIN =====
async function renderAdmin(){
  setTopbar('원장 대시보드', showMenu);
  render(`<div class="loading"><div class="spinner"></div></div>`);
  const {data:studs}=await sb.from('students').select('*').neq('status','withdrawn');
  const active=(studs||[]).filter(s=>s.status==='active');
  const filled=active.filter(s=>isFilled(s.student_id)).length;
  const {data:staff}=await sb.from('staff').select('*').eq('active',true);

  let html=`<div class="date-bar">👑 ${todayLabel()} · 원장 대시보드</div>
  <div class="card">
    <div class="card-title">오늘 현황</div>
    <div class="stat-grid">
      <div><div class="stat-num" style="color:${filled<active.length?'var(--red)':'var(--g3)'}">${filled}<span style="font-size:14px;font-weight:500;color:var(--muted)">/${active.length}</span></div><div class="stat-label">클리닉 입력</div></div>
      <div><div class="stat-num">${active.length}</div><div class="stat-label">재원생</div></div>
      <div><div class="stat-num">${(staff||[]).length}</div><div class="stat-label">선생님</div></div>
    </div>
    ${filled<active.length?`<div style="margin-top:10px;background:#fef2f2;border-radius:8px;padding:8px 12px;font-size:12px;color:#991b1b">⚠️ 클리닉 미입력 ${active.length-filled}명</div>`:`<div style="margin-top:10px;background:var(--g6);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--g2)">✅ 오늘 클리닉 전체 입력 완료</div>`}
  </div>`;

  // 선생님 추가
  html+=`<div class="card">
    <div class="card-title">선생님 추가</div>
    <div class="fg"><label>이름</label><input type="text" id="nN" placeholder="예) 김지혜"></div>
    <div class="fg"><label>아이디</label><input type="text" id="nI" placeholder="예) jihye"></div>
    <div class="fg"><label>PIN (4자리)</label><input type="password" id="nP" maxlength="4" inputmode="numeric" placeholder="1234"></div>
    <div class="fg"><label>역할</label><select id="nR"><option value="teacher">담임</option><option value="clinic">클리닉</option><option value="manager">상담실장</option><option value="admin">원장</option></select></div>
    <div class="fg"><label>담당 반 (쉼표 구분)</label><input type="text" id="nC" placeholder="중2 B-2, 중3 T-1"></div>
    <button onclick="addStaff()" class="btn btn-g2" style="width:100%;padding:12px;border-radius:10px;margin-top:4px">선생님 추가</button>
  </div>`;

  // 선생님 목록
  html+=`<div class="sec">등록된 선생님</div>`;
  (staff||[]).forEach(t=>{
    const roleLabel={teacher:'담임',clinic:'클리닉',admin:'원장',manager:'상담실장'}[t.role]||t.role;
    html+=`<div class="stu-card">
      <div class="stu-avatar">${t.name[0]}</div>
      <div class="stu-info">
        <div class="stu-name">${t.name}</div>
        <div class="stu-meta">${roleLabel} · @${t.login_id}</div>
        <div class="stu-meta" style="color:var(--g3)">${(t.classes||[]).join(', ')||'전체'}</div>
      </div>
      <div class="stu-actions">
        <button class="btn btn-g" onclick="editStaff('${t.id}')">수정</button>
        <button class="btn btn-red" onclick="delStaff('${t.id}','${t.name}')">퇴사</button>
      </div>
    </div>`;
  });

  // 반 관리
  html += await renderClassMgmt();
  render(html);
}

async function addStaff(){
  const name=(document.getElementById('nN')?.value||'').trim();
  const lid=(document.getElementById('nI')?.value||'').trim();
  const pin=(document.getElementById('nP')?.value||'').trim();
  const role=document.getElementById('nR')?.value;
  const cls=(document.getElementById('nC')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  if(!name||!lid||pin.length!==4){ toast('이름·아이디·PIN(4자리) 필수예요'); return; }
  const {data:dup}=await sb.from('staff').select('id').eq('login_id',lid);
  if(dup&&dup.length>0){ toast('이미 있는 아이디예요'); return; }
  const {data:all}=await sb.from('staff').select('id');
  const ids=(all||[]).map(s=>parseInt(s.id.replace('T',''))).filter(n=>!isNaN(n));
  const newId=`T${String(Math.max(0,...ids)+1).padStart(3,'0')}`;
  const {error}=await sb.from('staff').insert({id:newId,name,login_id:lid,pin,role,classes:cls,active:true});
  if(error){ toast('추가 실패: '+error.message); return; }
  toast(`${name} 선생님 추가됐어요!`);
  renderAdmin();
}

async function delStaff(id,name){
  if(!confirm(`${name} 선생님을 퇴사 처리할까요?`)) return;
  await sb.from('staff').update({active:false}).eq('id',id);
  toast(`${name} 퇴사 처리됐어요`);
  renderAdmin();
}

async function editStaff(id){
  const {data:tRows}=await sb.from('staff').select('*').eq('id',id);
  const t=tRows&&tRows[0];
  if(!t) return;
  const modal=createModal(`<div class="modal-title">선생님 정보 수정</div>
    <div class="fg"><label>이름</label><input type="text" id="et-n" value="${t.name}"></div>
    <div class="fg"><label>아이디</label><input type="text" id="et-i" value="${t.login_id||''}"></div>
    <div class="fg"><label>PIN (변경 시 입력)</label><input type="password" id="et-p" placeholder="비워두면 유지" maxlength="4" inputmode="numeric"></div>
    <div class="fg"><label>역할</label><select id="et-r"><option value="teacher" ${t.role==='teacher'?'selected':''}>담임</option><option value="clinic" ${t.role==='clinic'?'selected':''}>클리닉</option><option value="manager" ${t.role==='manager'?'selected':''}>상담실장</option><option value="admin" ${t.role==='admin'?'selected':''}>원장</option></select></div>
    <div class="fg"><label>담당 반 (쉼표 구분)</label><input type="text" id="et-c" value="${(t.classes||[]).join(', ')}"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-g2" style="flex:1;padding:14px" onclick="saveStaff('${id}')">저장</button>
      <button class="btn btn-gray" style="padding:14px 20px" onclick="closeModal()">취소</button>
    </div>`);
  document.body.appendChild(modal);
}

async function saveStaff(id){
  const name=(document.getElementById('et-n')?.value||'').trim();
  const loginId=(document.getElementById('et-i')?.value||'').trim();
  const pin=(document.getElementById('et-p')?.value||'').trim();
  const role=document.getElementById('et-r')?.value;
  const cls=(document.getElementById('et-c')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  if(!name||!loginId){ toast('이름과 아이디는 필수예요'); return; }
  const upd={name,login_id:loginId,role,classes:cls};
  if(pin&&pin.length===4) upd.pin=pin;
  const {error}=await sb.from('staff').update(upd).eq('id',id);
  if(error){ toast('수정 실패'); return; }
  toast(`${name} 수정됐어요`);
  closeModal(); renderAdmin();
}

async function renderClassMgmt(){
  const {data:classes}=await sb.from('classes').select('*').order('class_id');
  const active=(classes||[]).filter(c=>c.status==='active');
  const inactive=(classes||[]).filter(c=>c.status!=='active');
  let html=`<div class="sec">반 관리</div>
  <div class="card">
    <div class="card-title">반 추가</div>
    <div class="row2" style="margin-bottom:10px">
      <div class="fg"><label>반 이름</label><input type="text" id="nc-name" placeholder="예) 중2 B-5"></div>
      <div class="fg"><label>학년</label><input type="text" id="nc-grade" placeholder="예) 중2"></div>
    </div>
    <button onclick="addClass()" class="btn btn-g2" style="width:100%;padding:12px;border-radius:10px">반 추가</button>
  </div>
  <div class="sec">등록된 반 (${active.length}개)</div>`;
  active.forEach(c=>{
    html+=`<div class="stu-card"><div class="stu-avatar" style="font-size:11px;font-weight:700">${c.grade||'?'}</div><div class="stu-info"><div class="stu-name">${c.class_id}</div></div><button class="btn btn-red" onclick="deactivateClass('${c.class_id}')">비활성</button></div>`;
  });
  return html;
}

async function addClass(){
  const name=(document.getElementById('nc-name')?.value||'').trim();
  const grade=(document.getElementById('nc-grade')?.value||'').trim();
  if(!name){ toast('반 이름을 입력해주세요'); return; }
  const {error}=await sb.from('classes').upsert({class_id:name,class_name:name,grade,status:'active'},{onConflict:'class_id'});
  if(error){ toast('추가 실패'); return; }
  toast(`${name} 반 추가됐어요!`); renderAdmin();
}

async function deactivateClass(classId){
  const {data:studs}=await sb.from('students').select('student_id').eq('class_id',classId).eq('status','active');
  if(studs&&studs.length>0){ toast(`학생 ${studs.length}명이 있어요. 먼저 이동해주세요`); return; }
  await sb.from('classes').update({status:'inactive'}).eq('class_id',classId);
  toast(`${classId} 비활성화됐어요`); renderAdmin();
}

// ===== TAB SWITCH =====
function switchTab(btn,prefix,cls){
  const panel=document.getElementById(`${prefix}-${cssId(cls)}`);
  if(!panel) return;
  btn.closest('.ctabs').querySelectorAll('.ctab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll(`[id^="${prefix}-"]`).forEach(p=>p.classList.remove('on'));
  btn.classList.add('on'); panel.classList.add('on');
}

// ===== MODAL =====
function createModal(innerHtml){
  const wrap=document.createElement('div');
  wrap.className='modal-wrap';
  wrap.id='activeModal';
  wrap.onclick=e=>{ if(e.target===wrap) closeModal(); };
  wrap.innerHTML=`<div class="modal-box">${innerHtml}</div>`;
  return wrap;
}
function closeModal(){ document.getElementById('activeModal')?.remove(); }

// ===== nav helper =====
window.renderClinic=renderClinic;
window.renderTeacher=renderTeacher;
window.renderAdmin=renderAdmin;
window.renderStudentMgmt=renderStudentMgmt;
window.renderSearch=renderSearch;
window.renderHistory=renderHistory;
</script>
</body>
</html>
